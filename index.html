  async function hashString(str){
    const enc = new TextEncoder().encode(str);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function githubRequest(path, method, body){
    const headers = {
      'Accept':'application/vnd.github+json',
      'Authorization':'Bearer '+syncConfig.token,
      'X-GitHub-Api-Version':'2022-11-28',
    };
    if(body) headers['Content-Type'] = 'application/json';
    const res = await fetch('https://api.github.com'+path, {
      method, headers, body: body ? JSON.stringify(body) : undefined,
    });
    if(method === 'DELETE' && res.ok) return null;
    if(!res.ok){
      const text = await res.text().catch(()=>'');
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }

  async function createGist(dataJson, boardName){
    const gist = await githubRequest('/gists', 'POST', {
      description: 'Mini Whiteboard Sync: ' + boardName,
      public: false,
      files: { 'whiteboard.json': { content: dataJson } }
    });
    return gist.id;
  }
  async function readGist(gistId){
    const gist = await githubRequest('/gists/'+gistId, 'GET');
    const file = gist.files && gist.files['whiteboard.json'];
    if(!file) return null;
    let content = file.content;
    if(file.truncated && file.raw_url){
      const res = await fetch(file.raw_url);
      content = await res.text();
    }
    return { content, updatedAt: new Date(gist.updated_at).getTime() };
  }
  async function writeGist(gistId, dataJson){
    await githubRequest('/gists/'+gistId, 'PATCH', {
      files: { 'whiteboard.json': { content: dataJson } }
    });
  }

// ========= INDEX GIST SYNC =========
function serializeBoardsIndex(){
  return {
    version: 1,
    lastModified: Date.now(),
    boards: boardsIndex.boards.map(b => ({
      id: b.id,
      name: b.name,
      gistId: b.gistId || null,
      createdAt: b.createdAt || Date.now(),
      deletedAt: b.deletedAt || null,
    })),
  };
}

async function findOrCreateIndexGist(){
  // Falls bereits bekannt: zurückgeben
  if(syncConfig.indexGistId) return syncConfig.indexGistId;

  // Discovery: Eigene Gists durchsuchen
  try{
    const gists = await githubRequest('/gists?per_page=100', 'GET');
    const found = gists.find(g =>
      g.description === 'Mini Whiteboard Index' &&
      g.files && g.files[INDEX_FILENAME]
    );
    if(found){
      syncConfig.indexGistId = found.id;
      saveSyncConfig();
      return found.id;
    }
  }catch(err){
    console.warn('Gist discovery failed', err);
  }

  // Neu erstellen
  const indexData = serializeBoardsIndex();
  const gist = await githubRequest('/gists', 'POST', {
    description: 'Mini Whiteboard Index',
    public: false,
    files: { [INDEX_FILENAME]: { content: JSON.stringify(indexData, null, 2) } }
  });
  syncConfig.indexGistId = gist.id;
  saveSyncConfig();
  return gist.id;
}

async function loadIndexFromCloud(){
  if(!syncConfig.enabled || !syncConfig.token) return null;
  try{
    const indexId = await findOrCreateIndexGist();
    const gist = await githubRequest('/gists/'+indexId, 'GET');
    const file = gist.files && gist.files[INDEX_FILENAME];
    if(!file) return null;
    let content = file.content;
    if(file.truncated && file.raw_url){
      const res = await fetch(file.raw_url);
      content = await res.text();
    }
    return JSON.parse(content);
  }catch(err){
    console.warn('Index load failed', err);
    return null;
  }
}

async function pushIndexToCloud(){
  if(!syncConfig.enabled || !syncConfig.token) return;
  try{
    const indexId = await findOrCreateIndexGist();
    const indexData = serializeBoardsIndex();
    await githubRequest('/gists/'+indexId, 'PATCH', {
      files: { [INDEX_FILENAME]: { content: JSON.stringify(indexData, null, 2) } }
    });
  }catch(err){
    console.warn('Index push failed', err);
    toast('Index-Sync fehlgeschlagen', 'error');
  }
}

// Debounced Index-Push
let indexPushTimer = null;
function scheduleIndexPush(){
  if(!syncConfig.enabled) return;
  if(indexPushTimer) clearTimeout(indexPushTimer);
  indexPushTimer = setTimeout(pushIndexToCloud, 2000);
}

// Merge: Cloud-Index mit lokalem mergen
async function mergeIndexFromCloud(){
  const cloudIndex = await loadIndexFromCloud();
  if(!cloudIndex || !Array.isArray(cloudIndex.boards)){
    // Kein Cloud-Index: lokalen hochladen
    await pushIndexToCloud();
    return false;
  }

  const localById = new Map(boardsIndex.boards.map(b => [b.id, b]));
  const cloudById = new Map(cloudIndex.boards.map(b => [b.id, b]));
  const mergedById = new Map();
  let changed = false;

  // 1. Cloud-Boards übernehmen (auch neue, die lokal fehlen)
  cloudById.forEach((cloudBoard, id) => {
    if(cloudBoard.deletedAt){
      // In Cloud gelöscht: lokal nicht hinzufügen, lokale Daten ggf. entfernen
      if(localById.has(id)){
        try{
          localStorage.removeItem(BOARD_PREFIX + id);
          localStorage.removeItem(BACKUP_PREFIX + id);
          localStorage.removeItem(HISTORY_PREFIX + id);
        }catch{}
        changed = true;
      }
      return;
    }
    const local = localById.get(id);
    if(!local){
      // Neu aus Cloud: hinzufügen
      mergedById.set(id, {
        id: cloudBoard.id,
        name: cloudBoard.name,
        gistId: cloudBoard.gistId || null,
        publicGistId: null,
        createdAt: cloudBoard.createdAt || Date.now(),
      });
      changed = true;
    } else {
      // Beide kennen das Board: Cloud-Werte für Name/GistId nehmen, falls Cloud neuer ist
      // Vereinfacht: Cloud-Name + Cloud-GistId, lokale Daten bleiben
      const merged = Object.assign({}, local);
      if(cloudBoard.name && cloudBoard.name !== local.name){ merged.name = cloudBoard.name; changed = true; }
      if(cloudBoard.gistId && cloudBoard.gistId !== local.gistId){ merged.gistId = cloudBoard.gistId; changed = true; }
      mergedById.set(id, merged);
    }
  });

  // 2. Lokale Boards, die nicht in Cloud sind: behalten und nach oben pushen
  localById.forEach((localBoard, id) => {
    if(!cloudById.has(id)){
      mergedById.set(id, localBoard);
      changed = true; // Index muss aktualisiert werden
    }
  });

  if(mergedById.size === 0){
    // Edge case: alles gelöscht. Default-Board anlegen.
    const fallbackId = newBoardId();
    mergedById.set(fallbackId, {
      id: fallbackId, name:'Whiteboard 1', gistId:null, publicGistId:null, createdAt:Date.now()
    });
    changed = true;
  }

  boardsIndex.boards = Array.from(mergedById.values());

  // Aktives Board prüfen
  if(!boardsIndex.boards.find(b => b.id === boardsIndex.activeId)){
    boardsIndex.activeId = boardsIndex.boards[0].id;
    changed = true;
  }

  saveBoardsIndex();
  if(changed){
    await pushIndexToCloud();
    updateBoardSwitcherUI();
  }
  return changed;
}

  async function initialSyncForActive(){
    if(!syncConfig.enabled) return false;
    const b = getActiveBoard();
    if(!b) return false;
    setSyncStatus('syncing','Verbinde...');
    try{
      if(!b.gistId){
        const dataJson = JSON.stringify(serializeState(), null, 2);
        const id = await createGist(dataJson, b.name);
        b.gistId = id;
        saveBoardsIndex();
        boardSyncState.lastSyncedAt = Date.now();
        boardSyncState.lastSyncedHash = await hashString(dataJson);
        setSyncStatus('ok', 'Synchronisiert');
        toast('Secret Gist erstellt', 'success');
        return true;
      } else {
        const remote = await readGist(b.gistId);
        if(!remote){
          const dataJson = JSON.stringify(serializeState(), null, 2);
          await writeGist(b.gistId, dataJson);
          boardSyncState.lastSyncedAt = Date.now();
          boardSyncState.lastSyncedHash = await hashString(dataJson);
          setSyncStatus('ok', 'Synchronisiert');
          return true;
        }
        const remoteData = JSON.parse(remote.content);
        const localModified = state.lastModified || 0;
        const remoteModified = remoteData.lastModified || remote.updatedAt || 0;

        if(remoteModified > localModified + 1000){
          const applyRemote = (state.cards.length === 0 && state.links.length === 0) ||
            confirm(`Cloud-Version ist neuer (${new Date(remoteModified).toLocaleString()}). Lokale Daten überschreiben?`);
          if(applyRemote){
            state = Object.assign(defaultState(), remoteData);
            state.cards = state.cards.map(c => Object.assign({autoH:true, image:null, caption:''}, c));
            bgLayout.style.display = state.showBg ? '' : 'none';
            minimap.style.display = state.showMm === false ? 'none' : '';
            updateAutoColorButton();
            if(!state.view) fitLayoutToView(); else applyView();
            render();
            saveImmediate();
            boardSyncState.lastSyncedAt = Date.now();
            boardSyncState.lastSyncedHash = await hashString(remote.content);
            setSyncStatus('ok', 'Von Cloud geladen');
            return true;
          }
        }
        const dataJson = JSON.stringify(serializeState(), null, 2);
        await writeGist(b.gistId, dataJson);
        boardSyncState.lastSyncedAt = Date.now();
        boardSyncState.lastSyncedHash = await hashString(dataJson);
        setSyncStatus('ok', 'Synchronisiert');
        return true;
      }
    }catch(err){
      console.error(err);
      setSyncStatus('error', 'Fehler: '+(err.message||'').slice(0,40));
      toast('Sync-Fehler: '+err.message, 'error');
      return false;
    }
  }

  function scheduleSync(){
    if(syncTimer) clearTimeout(syncTimer);
    syncTimer = setTimeout(doSync, SYNC_DEBOUNCE);
  }
  async function doSync(){
    if(!syncConfig.enabled || syncInFlight) return;
    const b = getActiveBoard();
    if(!b) return;
    if(!b.gistId){
      // Erster Sync für dieses Board
      return initialSyncForActive();
    }
    syncInFlight = true;
    try{
      const dataJson = JSON.stringify(serializeState(), null, 2);
      const hash = await hashString(dataJson);
      if(hash === boardSyncState.lastSyncedHash){
        setSyncStatus('ok', 'Aktuell');
        syncInFlight = false;
        return;
      }
      setSyncStatus('syncing', 'Sende...');
      await writeGist(b.gistId, dataJson);
      boardSyncState.lastSyncedAt = Date.now();
      boardSyncState.lastSyncedHash = hash;
      setSyncStatus('ok', 'Synchronisiert');
    }catch(err){
      console.error(err);
      setSyncStatus('error', 'Sync-Fehler');
      toast('Sync fehlgeschlagen: '+err.message, 'error');
    }finally{
      syncInFlight = false;
    }
  }

  async function manualSync(){
    if(!syncConfig.enabled){ openSyncModal(); return; }
    await doSync();
  }
  async function manualPull(){
    if(!syncConfig.enabled){ openSyncModal(); return; }
    const b = getActiveBoard();
    if(!b || !b.gistId){ toast('Kein Cloud-Gist für dieses Board', 'error'); return; }
    confirmSimple('Cloud-Version laden?',
      'Wirklich Cloud-Version laden? Lokale nicht-synchronisierte Änderungen gehen verloren.',
      'Laden',
      async ()=>{
        setSyncStatus('syncing', 'Lade...');
        try{
          const remote = await readGist(b.gistId);
          if(!remote){ toast('Cloud leer', 'error'); setSyncStatus('error','Leer'); return; }
          const remoteData = JSON.parse(remote.content);
          pushUndo();
          state = Object.assign(defaultState(), remoteData);
          state.cards = state.cards.map(c => Object.assign({autoH:true, image:null, caption:''}, c));
          bgLayout.style.display = state.showBg ? '' : 'none';
          minimap.style.display = state.showMm === false ? 'none' : '';
          updateAutoColorButton();
          if(!state.view) fitLayoutToView(); else applyView();
          render();
          saveImmediate();
          boardSyncState.lastSyncedAt = Date.now();
          boardSyncState.lastSyncedHash = await hashString(remote.content);
          setSyncStatus('ok', 'Von Cloud geladen');
          toast('Cloud-Version geladen', 'success');
        }catch(err){
          setSyncStatus('error','Fehler');
          toast('Laden fehlgeschlagen: '+err.message, 'error');
        }
      });
  }

  
  setInterval(()=>{
    if(syncConfig.enabled && !syncInFlight){
      const b = getActiveBoard();
      if(b && b.gistId) doSync();
    }
  }, SYNC_INTERVAL);
  

  // ========= INIT =========
state = loadActiveBoardState();
state.cards = state.cards.map(c => Object.assign({autoH:true, image:null, caption:''}, c));
if(!state.view) fitLayoutToView(); else applyView();

if(state.cards.length === 0){
  initZoneTemplate();
  render();
  saveImmediate();
} else {
  render();
}
updateUndoButtons();

if(syncConfig.enabled && syncConfig.token){
  setSyncStatus('syncing', 'Verbinde...');
  // Erst Index aus Cloud holen, dann aktives Board syncen
  (async () => {
    const indexChanged = await pullIndexFromCloud();
    if(indexChanged){
      // Aktives Board könnte jetzt anders sein (oder gelöscht)
      const active = getActiveBoard();
      if(!active && boardsIndex.boards.length > 0){
        boardsIndex.activeId = boardsIndex.boards[0].id;
        saveBoardsIndex();
      }
      // State neu laden (falls aktives Board gewechselt wurde)
      state = loadActiveBoardState();
      state.cards = state.cards.map(c => Object.assign({autoH:true, image:null, caption:''}, c));
      if(!state.view) fitLayoutToView(); else applyView();
      render();
      updateBoardSwitcherUI();
    }
    await initialSyncForActive();
  })();
} else {
  setSyncStatus('off', 'Offline (Sync aus)');
}

window.addEventListener('resize', ()=>{ updateLinks(); renderMinimap(); });

// Periodischer Index-Pull (alle 60s), damit neue Boards von anderen Geräten erscheinen
setInterval(async () => {
  if(!syncConfig.enabled || syncInFlight) return;
  try {
    const changed = await pullIndexFromCloud();
    if(changed){
      updateBoardSwitcherUI();
      toast('Board-Liste aktualisiert');
    }
  } catch(err){ console.warn('periodic index pull failed', err); }
}, 60000);

console.log('Whiteboard v15 Multi-Board initialisiert', {
  boards: boardsIndex ? boardsIndex.boards.length : 0,
  sync: syncConfig.enabled,
});
