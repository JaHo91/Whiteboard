  // ========= SYNC LOGIC =========
  function setSyncStatus(kind, text){
    syncStatusEl.classList.remove('ok','pending','error','syncing','off');
    if(kind) syncStatusEl.classList.add(kind);
    syncStatusText.textContent = text;
  }

  async function hashString(str){
    const enc = new TextEncoder().encode(str);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function githubRequest(token, path, method, body){
    const headers = {
      'Accept':'application/vnd.github+json',
      'Authorization':'Bearer '+token,
      'X-GitHub-Api-Version':'2022-11-28',
    };
    if(body) headers['Content-Type'] = 'application/json';
    const res = await fetch('https://api.github.com'+path, {
      method, headers, body: body ? JSON.stringify(body) : undefined,
    });
    if(!res.ok){
      const text = await res.text().catch(()=>'');
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }

  async function createGist(dataJson){
    const gist = await githubRequest(syncConfig.token, '/gists', 'POST', {
      description: 'Mini Whiteboard Sync',
      public: false,
      files: { 'whiteboard.json': { content: dataJson } }
    });
    return gist.id;
  }
  async function readGist(){
    const gist = await githubRequest(syncConfig.token, '/gists/'+syncConfig.gistId, 'GET');
    const file = gist.files && gist.files['whiteboard.json'];
    if(!file) return null;
    let content = file.content;
    if(file.truncated && file.raw_url){
      const res = await fetch(file.raw_url);
      content = await res.text();
    }
    return { content, updatedAt: new Date(gist.updated_at).getTime() };
  }
  async function writeGist(dataJson){
    await githubRequest(syncConfig.token, '/gists/'+syncConfig.gistId, 'PATCH', {
      files: { 'whiteboard.json': { content: dataJson } }
    });
  }

  async function initialSync(){
    if(!syncConfig.enabled) return false;
    setSyncStatus('syncing','Verbinde...');
    try{
      if(!syncConfig.gistId){
        const dataJson = JSON.stringify(serializeState(), null, 2);
        const id = await createGist(dataJson);
        syncConfig.gistId = id;
        syncConfig.lastSyncedAt = Date.now();
        syncConfig.lastSyncedHash = await hashString(dataJson);
        saveSyncConfig();
        setSyncStatus('ok', 'Synchronisiert · neuer Gist');
        toast('Secret Gist erstellt: '+id.slice(0,8)+'...', 'success');
        return true;
      } else {
        const remote = await readGist();
        if(!remote){
          const dataJson = JSON.stringify(serializeState(), null, 2);
          await writeGist(dataJson);
          syncConfig.lastSyncedAt = Date.now();
          syncConfig.lastSyncedHash = await hashString(dataJson);
          saveSyncConfig();
          setSyncStatus('ok', 'Synchronisiert');
          return true;
        }
        const remoteData = JSON.parse(remote.content);
        const localModified = state.lastModified || 0;
        const remoteModified = remoteData.lastModified || remote.updatedAt || 0;

        if(remoteModified > localModified + 1000){
          const applyRemote = (state.cards.length === 0 && state.links.length === 0) ||
            confirm(`Cloud-Version ist neuer (${new Date(remoteModified).toLocaleString()}). Lokale Daten überschreiben?`);
          if(applyRemote){
            state = Object.assign(defaultState(), remoteData);
            state.cards = state.cards.map(c => Object.assign({autoH:true, image:null, caption:''}, c));
            bgLayout.style.display = state.showBg ? '' : 'none';
            minimap.style.display = state.showMm === false ? 'none' : '';
            updateAutoColorButton();
            if(!state.view) fitLayoutToView(); else applyView();
            render();
            saveImmediate();
            syncConfig.lastSyncedAt = Date.now();
            syncConfig.lastSyncedHash = await hashString(remote.content);
            saveSyncConfig();
            setSyncStatus('ok', 'Von Cloud geladen');
            return true;
          }
        }
        const dataJson = JSON.stringify(serializeState(), null, 2);
        await writeGist(dataJson);
        syncConfig.lastSyncedAt = Date.now();
        syncConfig.lastSyncedHash = await hashString(dataJson);
        saveSyncConfig();
        setSyncStatus('ok', 'Synchronisiert');
        return true;
      }
    }catch(err){
      console.error(err);
      setSyncStatus('error', 'Fehler: '+(err.message||'').slice(0,40));
      toast('Sync-Fehler: '+err.message, 'error');
      return false;
    }
  }

  function scheduleSync(){
    if(syncTimer) clearTimeout(syncTimer);
    syncTimer = setTimeout(doSync, SYNC_DEBOUNCE);
  }
  async function doSync(){
    if(!syncConfig.enabled || !syncConfig.gistId || syncInFlight) return;
    syncInFlight = true;
    try{
      const dataJson = JSON.stringify(serializeState(), null, 2);
      const hash = await hashString(dataJson);
      if(hash === syncConfig.lastSyncedHash){
        setSyncStatus('ok', 'Aktuell');
        syncInFlight = false;
        return;
      }
      setSyncStatus('syncing', 'Sende...');
      await writeGist(dataJson);
      syncConfig.lastSyncedAt = Date.now();
      syncConfig.lastSyncedHash = hash;
      saveSyncConfig();
      setSyncStatus('ok', 'Synchronisiert');
    }catch(err){
      console.error(err);
      setSyncStatus('error', 'Sync-Fehler');
      toast('Sync fehlgeschlagen: '+err.message, 'error');
    }finally{
      syncInFlight = false;
    }
  }

  async function manualSync(){
    if(!syncConfig.enabled){ openSyncModal(); return; }
    await doSync();
  }
  async function manualPull(){
    if(!syncConfig.enabled){ openSyncModal(); return; }
    confirmSingle('Cloud-Version laden?',
      'Wirklich Cloud-Version laden? Lokale nicht-synchronisierte Änderungen gehen verloren.',
      'Laden',
      async ()=>{
        setSyncStatus('syncing', 'Lade...');
        try{
          const remote = await readGist();
          if(!remote){ toast('Cloud leer', 'error'); setSyncStatus('error','Leer'); return; }
          const remoteData = JSON.parse(remote.content);
          pushUndo();
          state = Object.assign(defaultState(), remoteData);
          state.cards = state.cards.map(c => Object.assign({autoH:true, image:null, caption:''}, c));
          bgLayout.style.display = state.showBg ? '' : 'none';
          minimap.style.display = state.showMm === false ? 'none' : '';
          updateAutoColorButton();
          if(!state.view) fitLayoutToView(); else applyView();
          render();
          saveImmediate();
          syncConfig.lastSyncedAt = Date.now();
          syncConfig.lastSyncedHash = await hashString(remote.content);
          saveSyncConfig();
          setSyncStatus('ok', 'Von Cloud geladen');
          toast('Cloud-Version geladen', 'success');
        }catch(err){
          setSyncStatus('error','Fehler');
          toast('Laden fehlgeschlagen: '+err.message, 'error');
        }
      });
  }

  setInterval(()=>{
    if(syncConfig.enabled && syncConfig.gistId && !syncInFlight){
      doSync();
    }
  }, SYNC_INTERVAL);

  // ========= COMMENTS LOGIC =========
  async function readCommentsGist(){
    const res = await fetch('https://api.github.com/gists/'+commentsConfig.gistId, {
      headers: {
        'Accept':'application/vnd.github+json',
        'Authorization':'Bearer '+commentsConfig.token,
        'X-GitHub-Api-Version':'2022-11-28',
      }
    });
    if(!res.ok){
      const text = await res.text().catch(()=>'');
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    const gist = await res.json();
    const file = gist.files && gist.files['comments.json'];
    if(!file) return [];
    let content = file.content;
    if(file.truncated && file.raw_url){
      const r = await fetch(file.raw_url);
      content = await r.text();
    }
    try{
      const arr = JSON.parse(content);
      return Array.isArray(arr) ? arr : [];
    }catch{ return []; }
  }
  async function writeCommentsGist(commentsArr){
    const res = await fetch('https://api.github.com/gists/'+commentsConfig.gistId, {
      method:'PATCH',
      headers: {
        'Accept':'application/vnd.github+json',
        'Authorization':'Bearer '+commentsConfig.token,
        'Content-Type':'application/json',
        'X-GitHub-Api-Version':'2022-11-28',
      },
      body: JSON.stringify({
        files: { 'comments.json': { content: JSON.stringify(commentsArr, null, 2) } }
      })
    });
    if(!res.ok){
      const text = await res.text().catch(()=>'');
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
  }

  async function loadComments(showToast){
    if(!commentsConfig.enabled || commentsInFlight) return false;
    commentsInFlight = true;
    try{
      const arr = await readCommentsGist();
      const prevCount = comments.length;
      const prevIds = new Set(comments.map(c=>c.id));
      comments = arr.map(c => Object.assign({
        id:'', x:0, y:0, text:'', author:'Anonym', timestamp:Date.now()
      }, c));
      comments.sort((a,b)=> (b.timestamp||0) - (a.timestamp||0));

      // Neue Kommentare zählen (seit letztem "gesehen")
      const newComments = comments.filter(c => (c.timestamp||0) > commentsLastSeen);
      const newSinceReload = comments.filter(c => !prevIds.has(c.id) && prevCount > 0);

      renderCommentNotes(newSinceReload.map(c=>c.id));
      renderCommentList();
      updateCommentBadge();
      renderMinimap();

      if(showToast){
        toast(`${comments.length} Kommentar${comments.length===1?'':'e'} geladen`, 'success');
      } else if(newSinceReload.length > 0){
        toast(`💬 ${newSinceReload.length} neue${newSinceReload.length===1?'r':''} Kommentar${newSinceReload.length===1?'':'e'}`, 'success');
      }
      return true;
    }catch(err){
      console.error(err);
      if(showToast) toast('Kommentare laden fehlgeschlagen: '+err.message, 'error');
      return false;
    }finally{
      commentsInFlight = false;
    }
  }

  async function addCommentToGist(newComment){
    const arr = await readCommentsGist();
    arr.push(newComment);
    await writeCommentsGist(arr);
    comments = arr.map(c => Object.assign({id:'', x:0, y:0, text:'', author:'Anonym', timestamp:Date.now()}, c));
    comments.sort((a,b)=> (b.timestamp||0) - (a.timestamp||0));
    renderCommentNotes();
    renderCommentList();
    updateCommentBadge();
    renderMinimap();
  }
  async function deleteCommentFromGist(commentId){
    const arr = await readCommentsGist();
    const filtered = arr.filter(c=>c.id !== commentId);
    await writeCommentsGist(filtered);
    comments = filtered.map(c => Object.assign({id:'', x:0, y:0, text:'', author:'Anonym', timestamp:Date.now()}, c));
    comments.sort((a,b)=> (b.timestamp||0) - (a.timestamp||0));
    renderCommentNotes();
    renderCommentList();
    updateCommentBadge();
    renderMinimap();
  }

  function renderCommentNotes(newIds){
    [...board.querySelectorAll('.comment-note')].forEach(n=>n.remove());
    const newIdSet = new Set(newIds || []);
    comments.forEach(c=>{
      const note = document.createElement('div');
      note.className = 'comment-note';
      if(c.author === commentsConfig.ownerName) note.classList.add('owner');
      if(newIdSet.has(c.id)) note.classList.add('new');
      note.style.left = (c.x - 18) + 'px';
      note.style.top = (c.y - 18) + 'px';
      note.textContent = '💬';
      note.title = `${c.author || 'Anonym'}: ${(c.text||'').slice(0,100)}${(c.text||'').length>100?'...':''}`;
      note.dataset.id = c.id;
      note.addEventListener('click', (e)=>{
        e.stopPropagation();
        openCommentPanel();
        highlightCommentInList(c.id);
      });
      board.appendChild(note);
    });

  function renderCommentList(){
    if(!comments.length){
      commentList.innerHTML = '<div class="comment-panel-empty">Keine Kommentare vorhanden</div>';
      return;
    }
    commentList.innerHTML = '';
    comments.forEach(c=>{
      const item = document.createElement('div');
      item.className = 'comment-item';
      if(c.author === commentsConfig.ownerName) item.classList.add('owner');
      item.dataset.id = c.id;
      const d = new Date(c.timestamp || Date.now());
      const isOwner = c.author === commentsConfig.ownerName;
      item.innerHTML = `
        <button class="delete-btn" title="Löschen">🗑</button>
        <div class="author">${escapeHtml(c.author || 'Anonym')}${isOwner ? ' <span class="owner-badge">OWNER</span>' : ''}</div>
        <div class="timestamp">${d.toLocaleString()}</div>
        <div class="text">${escapeHtml(c.text || '')}</div>
      `;
      item.addEventListener('click', (e)=>{
        if(e.target.closest('.delete-btn')) return;
        centerOnPoint(c.x, c.y);
        const note = board.querySelector(`.comment-note[data-id="${c.id}"]`);
        if(note){
          note.classList.remove('new');
          void note.offsetWidth;
          note.classList.add('new');
        }
      });
      item.querySelector('.delete-btn').addEventListener('click', (e)=>{
        e.stopPropagation();
        confirmSingle(
          'Kommentar löschen?',
          `Kommentar von <b>${escapeHtml(c.author||'Anonym')}</b> wirklich löschen?<br><i>"${escapeHtml((c.text||'').slice(0,80))}${(c.text||'').length>80?'...':''}"</i>`,
          'Löschen',
          async ()=>{
            try{
              await deleteCommentFromGist(c.id);
              toast('Kommentar gelöscht', 'success');
            }catch(err){
              toast('Löschen fehlgeschlagen: '+err.message, 'error');
            }
          }
        );
      });
      commentList.appendChild(item);
    });
  }

  function highlightCommentInList(id){
    const items = commentList.querySelectorAll('.comment-item');

  }
  function stopPlacingComment(){
    placingComment = false;
    viewport.classList.remove('placing-comment');
    const banner = document.getElementById('placingBanner');
    if(banner) banner.remove();
  }

  function openCommentCreateDialog(x, y){
    showModal('Kommentar hinzufügen', (body)=>{
      body.innerHTML = `
        <p>An Position <code>(${Math.round(x)}, ${Math.round(y)})</code></p>
        <p><b>Dein Kommentar</b> (max. ${COMMENT_MAX_LEN} Zeichen)</p>
        <textarea id="commentTextInput" style="width:100%;min-height:100px;padding:8px 10px;border:1px solid #d0d4da;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical" maxlength="${COMMENT_MAX_LEN}" placeholder="Dein Kommentar..."></textarea>
        <p class="small">Du schreibst als <b>${escapeHtml(commentsConfig.ownerName)}</b> (Owner-Markierung).</p>
      `;
      setTimeout(()=>{ const ta = body.querySelector('#commentTextInput'); if(ta) ta.focus(); }, 50);
    }, 'Kommentar speichern', async (box)=>{
      const text = box.querySelector('#commentTextInput').value.trim();
      if(!text){ alert('Bitte Text eingeben'); return; }
      closeModal();
      const newComment = {
        id: 'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),
        x: Math.round(x),
        y: Math.round(y),
        text,
        author: commentsConfig.ownerName,
        timestamp: Date.now(),
      };
      try{
        toast('Kommentar wird gespeichert...');
        await addCommentToGist(newComment);
        toast('Kommentar hinzugefügt', 'success');
      }catch(err){
        toast('Speichern fehlgeschlagen: '+err.message, 'error');
      }
    });
  }

  // ========= INIT =========
  if(state.cards.length === 0){
    const zones = [
      { zone:'value_proposition', title:'Value Proposition', x: LAYOUT_OFFSET_X + 1159, y: LAYOUT_OFFSET_Y + 180 },
      { zone:'market_risks',      title:'Market Risk',       x: LAYOUT_OFFSET_X + 300,  y: LAYOUT_OFFSET_Y + 350 },
      { zone:'competition',       title:'Competitor',        x: LAYOUT_OFFSET_X + 700,  y: LAYOUT_OFFSET_Y + 560 },
      { zone:'customers',         title:'Customer Segment',  x: LAYOUT_OFFSET_X + 1159, y: LAYOUT_OFFSET_Y + 850 },
      { zone:'influencer',        title:'Influencer',        x: LAYOUT_OFFSET_X + 1640, y: LAYOUT_OFFSET_Y + 560 },
    ];
    zones.forEach(z => {
      createCard({ x: z.x, y: z.y, color: ZONE_COLORS[z.zone] || COLORS[0].bg, title: z.title, details:'' });
    });
  } else {
    render();
  }

  window.addEventListener('resize', ()=>{ updateLinks(); renderMinimap(); });
  updateUndoButtons();

  if(syncConfig.enabled && syncConfig.token){
    setSyncStatus('syncing', 'Verbinde...');
    initialSync();
  } else {
    setSyncStatus('off', 'Offline (Sync aus)');
  }

  if(commentsConfig.enabled){
    loadComments(false).then(ok => {
      if(ok) startCommentsPolling();
    });
  }

  updateCommentBadge();

  console.log('Whiteboard v16 initialisiert', {
    cards: state.cards.length, links: state.links.length,
    sync: syncConfig.enabled,
    comments: commentsConfig.enabled,
  });

  } catch (err) {
    console.error('Whiteboard Init-Fehler:', err);
    alert('Fehler beim Start: ' + err.message);
  }
})();
</script>
</body>
</html>
