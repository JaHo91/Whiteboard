<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Whiteboard Viewer</title>
<style>
  :root{
    --bg:#f4f5f7;
    --toolbar:#ffffff;
    --card-shadow:0 2px 6px rgba(0,0,0,.12);
    --card-shadow-hi:0 6px 18px rgba(0,0,0,.25);
    --line:#9aa0a6;
    --line-hi:#ff6b00;
    --anchor:#2b7fff;
    --danger:#e53935;
    --success:#2e7d32;
    --warning:#f57c00;
    --comment:#ffc107;
    --dim:.15;
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#222;background:var(--bg);overflow:hidden}

  .toolbar{
    position:fixed;top:0;left:0;right:0;height:48px;
    background:var(--toolbar);border-bottom:1px solid #e4e6eb;
    display:flex;align-items:center;gap:8px;padding:0 12px;z-index:20;
  }
  .toolbar button{
    font-size:13px;padding:6px 10px;border:1px solid #d0d4da;background:#fff;border-radius:6px;cursor:pointer;
  }
  .toolbar button:hover{background:#f0f2f5}
  .toolbar button.active{background:var(--comment);color:#222;border-color:#e0a800;font-weight:600}
  .toolbar .spacer{flex:1}
  .toolbar .title-label{font-size:14px;font-weight:600;color:#222}
  .toolbar .badge{
    background:#e4e6eb;color:#555;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;
  }
  .toolbar .badge.ok{background:var(--success);color:#fff}
  .toolbar .badge.err{background:var(--danger);color:#fff}

  .zoom-group{display:flex;align-items:center;gap:4px;border:1px solid #d0d4da;border-radius:6px;padding:2px;background:#fff}
  .zoom-group button{border:none;padding:4px 8px}
  #zoomLevel{font-size:12px;min-width:48px;text-align:center;color:#444}

  .status-pill{
    display:flex;align-items:center;gap:6px;font-size:12px;color:#666;
    padding:4px 10px;border:1px solid #d0d4da;border-radius:6px;background:#fff;
  }
  .status-pill .dot{width:8px;height:8px;border-radius:50%;background:#bbb}
  .status-pill.ok .dot{background:var(--success)}
  .status-pill.syncing .dot{background:var(--anchor);animation:pulse 1s infinite}
  .status-pill.err .dot{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .viewport{
    position:absolute;inset:48px 0 0 0;overflow:hidden;background:var(--bg);
    background-image:radial-gradient(circle, #dfe1e5 1px, transparent 1px);
    background-size:24px 24px;background-position:0 0;
    cursor:grab;
  }
  .viewport.panning{cursor:grabbing}
  .viewport.comment-mode{cursor:crosshair}
  .viewport.comment-mode.panning{cursor:grabbing}

  .board{
    position:absolute;left:0;top:0;width:8000px;height:6000px;
    transform-origin:0 0;will-change:transform;
  }

  svg.bg-layout{position:absolute;pointer-events:none;opacity:.85}
  svg.bg-layout .layout-stroke{
    fill:none;stroke:#222;stroke-width:3;vector-effect:non-scaling-stroke;
  }
  svg.bg-layout .layout-label{
    font-family:system-ui,-apple-system,sans-serif;
    font-size:28px;fill:#222;font-weight:500;
  }

  svg.links{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}
  svg.links path.link{
    fill:none;stroke:var(--line);stroke-width:2.2;opacity:.85;
    transition:stroke .15s, stroke-width .15s, opacity .15s;
  }

  .card{
    position:absolute;width:170px;min-width:60px;min-height:60px;border-radius:var(--radius);
    background:#fff;box-shadow:var(--card-shadow);display:flex;flex-direction:column;
    --card-font-scale:1;pointer-events:auto;
  }
  .card .title{
    padding:10px;font-weight:600;
    font-size:calc(14px * var(--card-font-scale));
    line-height:1.25;min-height:calc(40px * var(--card-font-scale));
    color:#222;user-select:none;
    border-radius:var(--radius) var(--radius) 0 0;flex:0 0 auto;
    word-break:break-word;
  }
  .card .details{
    padding:10px;background:#fff;
    font-size:calc(13px * var(--card-font-scale));
    line-height:1.35;min-height:calc(40px * var(--card-font-scale));
    white-space:pre-wrap;word-break:break-word;
    border-top:1px solid rgba(0,0,0,.06);
    border-radius:0 0 var(--radius) var(--radius);flex:1 1 auto;overflow:hidden;
  }
  .card.autoH .details{overflow:visible}
  .card.image-card{background:#222;overflow:hidden;padding:0}
  .card.image-card .title,.card.image-card .details{display:none}
  .card.image-card .image-wrap{
    position:relative;flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    border-radius:var(--radius);overflow:hidden;background:#222;
  }
  .card.image-card img{
    display:block;width:100%;height:100%;object-fit:contain;
    user-select:none;-webkit-user-drag:none;
  }
  .card.image-card .img-caption{
    position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(to top, rgba(0,0,0,.65), transparent);
    color:#fff;font-size:12px;padding:6px 8px;pointer-events:none;opacity:0;transition:opacity .15s;
  }
  .card.image-card:hover .img-caption{opacity:1}

  /* Kommentar-Haftnotizen */
  .comment-note{
    position:absolute;width:180px;min-height:60px;
    background:#fff8b3;
    border-radius:2px;
    box-shadow:2px 3px 8px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.05);
    padding:10px 10px 8px 10px;
    font-size:12px;line-height:1.35;color:#333;
    z-index:10;cursor:pointer;
    transform:rotate(-1.5deg);
    transition:transform .15s, box-shadow .15s;
    word-break:break-word;
  }
  .comment-note:hover{
    transform:rotate(0deg) scale(1.03);
    box-shadow:3px 5px 14px rgba(0,0,0,.25), 0 0 0 1px rgba(0,0,0,.08);
    z-index:11;
  }
  .comment-note:nth-child(even){transform:rotate(1.2deg)}
  .comment-note:nth-child(even):hover{transform:rotate(0deg) scale(1.03)}
  .comment-note .comment-text{
    margin-bottom:6px;white-space:pre-wrap;
    display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden;
  }
  .comment-note .comment-meta{
    font-size:10px;color:#777;
    border-top:1px dashed rgba(0,0,0,.15);
    padding-top:4px;display:flex;justify-content:space-between;gap:6px;
  }
  .comment-note .comment-author{font-weight:600;color:#555}
  .comment-note.own{background:#fff3a0;box-shadow:2px 3px 10px rgba(245,124,0,.3), 0 0 0 1px rgba(245,124,0,.3)}
  .comment-note .comment-del{
    position:absolute;top:2px;right:2px;width:18px;height:18px;
    border:none;background:rgba(255,255,255,.6);border-radius:3px;
    cursor:pointer;font-size:10px;line-height:1;opacity:0;transition:opacity .15s;
  }
  .comment-note.own:hover .comment-del{opacity:1}
  .comment-note .comment-del:hover{background:var(--danger);color:#fff}

  /* Vorschau beim Platzieren */
  .comment-preview{
    position:absolute;width:180px;height:80px;
    background:rgba(255,248,179,.5);
    border:2px dashed #e0a800;border-radius:2px;
    pointer-events:none;z-index:100;
    transform:rotate(-1.5deg);
  }

  .minimap{
    position:fixed;right:16px;bottom:16px;z-index:15;
    width:220px;height:165px;background:rgba(255,255,255,.92);
    border:1px solid #d0d4da;border-radius:8px;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
    overflow:hidden;cursor:crosshair;
  }
  .minimap svg{display:block;width:100%;height:100%}
  .minimap .mm-card{fill-opacity:.85;stroke:rgba(0,0,0,.25);stroke-width:1;vector-effect:non-scaling-stroke}
  .minimap .mm-comment{fill:var(--comment);fill-opacity:.9;stroke:rgba(0,0,0,.3);stroke-width:1;vector-effect:non-scaling-stroke}
  .minimap .mm-layout{fill:none;stroke:#222;stroke-width:1.5;vector-effect:non-scaling-stroke;opacity:.5}
  .minimap .mm-viewport{fill:rgba(43,127,255,.12);stroke:var(--anchor);stroke-width:1.5;vector-effect:non-scaling-stroke}

  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:#222;color:#fff;padding:8px 14px;border-radius:6px;font-size:13px;
    z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
  }
  .toast.show{opacity:1}
  .toast.error{background:var(--danger)}
  .toast.success{background:var(--success)}

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;
    display:flex;align-items:center;justify-content:center;
  }
  .modal{
    background:#fff;border-radius:10px;padding:20px;max-width:520px;width:90%;
    box-shadow:0 10px 40px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto;
  }
  .modal h2{margin:0 0 12px 0;font-size:18px}
  .modal p{margin:8px 0;font-size:13px;color:#555;line-height:1.5}
  .modal input[type=text],.modal input[type=password],.modal textarea{
    width:100%;padding:8px 10px;border:1px solid #d0d4da;border-radius:6px;
    font-size:13px;font-family:inherit;margin:4px 0 8px;
  }
  .modal textarea{resize:vertical;min-height:90px}
  .modal .char-counter{font-size:11px;color:#888;text-align:right;margin-top:-4px;margin-bottom:8px}
  .modal .char-counter.warn{color:var(--warning)}
  .modal .char-counter.err{color:var(--danger);font-weight:600}
  .modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .modal button{padding:8px 14px;border:1px solid #d0d4da;border-radius:6px;cursor:pointer;background:#fff;font-size:13px}
  .modal button:hover{background:#f0f2f5}
  .modal button.primary{background:var(--comment);color:#222;border-color:#e0a800;font-weight:600}
  .modal button.primary:hover{background:#e0a800}
  .modal button.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
  .modal button.danger:hover{background:#c62828}
  .modal a{color:var(--anchor);text-decoration:none}
  .modal a:hover{text-decoration:underline}
  .modal code{background:#f0f2f5;padding:2px 5px;border-radius:3px;font-size:12px;font-family:ui-monospace,monospace}
  .modal .small{font-size:11px;color:#888}
  .modal .confirm-warn{
    background:#fff4e5;border:1px solid #ffcc80;color:#6d4200;
    padding:10px 12px;border-radius:6px;font-size:13px;margin:8px 0;
  }
  .modal .comment-detail{
    background:#fff8b3;border-radius:6px;padding:12px;margin:8px 0;
    font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word;
  }
  .modal .comment-detail-meta{font-size:11px;color:#666;margin-top:8px}

  .mode-hint{
    position:fixed;top:58px;left:50%;transform:translateX(-50%);
    background:var(--comment);color:#222;padding:6px 14px;
    border-radius:20px;font-size:12px;font-weight:600;z-index:15;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    display:none;
  }
  .mode-hint.show{display:block}

  .loader{
    position:fixed;inset:0;background:rgba(244,245,247,.95);z-index:300;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;
    font-size:14px;color:#555;
  }
  .loader .spinner{
    width:40px;height:40px;border:4px solid #e4e6eb;border-top-color:var(--anchor);
    border-radius:50%;animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="toolbar">
  <span class="title-label" id="boardTitle">Whiteboard Viewer</span>
  <span class="badge" id="readOnlyBadge">Read-only</span>
  <div class="zoom-group">
    <button id="zoomOutBtn" title="Rauszoomen">−</button>
    <span id="zoomLevel">100%</span>
    <button id="zoomInBtn" title="Reinzoomen">+</button>
    <button id="zoomResetBtn" title="Auf Layout zentrieren">⟲</button>
  </div>
  <button id="commentModeBtn" title="Kommentar-Modus (C)">💬 Kommentar-Modus</button>
  <div class="spacer"></div>
  <div class="status-pill" id="boardStatus"><span class="dot"></span><span id="boardStatusText">—</span></div>
  <div class="status-pill" id="commentStatus"><span class="dot"></span><span id="commentStatusText">—</span></div>
  <button id="configBtn" title="Konfiguration">⚙</button>
</div>

<div class="mode-hint" id="modeHint">💬 Klicke aufs Board, um einen Kommentar zu platzieren · [ESC] zum Beenden</div>

<div class="viewport" id="viewport">
  <div class="board" id="board">
    <svg class="bg-layout" id="bgLayout" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="links" id="links" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="minimap" id="minimap">
  <svg id="minimapSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
</div>

<div class="toast" id="toast"></div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div id="loaderText">Lade Whiteboard...</div>
</div>

<script>
(() => {
  'use strict';
  try {

  // ========= KONSTANTEN =========
  const STORAGE_KEY_CONFIG = 'whiteboard_viewer_v1_config';
  const STORAGE_KEY_NAME = 'whiteboard_viewer_v1_name';
  const POLL_INTERVAL = 30000;
  const COMMENT_MAX_LENGTH = 200;
  const BOARD_W = 8000, BOARD_H = 6000;
  const LAYOUT_W = 2488, LAYOUT_H = 1672;
  const LAYOUT_OFFSET_X = (BOARD_W - LAYOUT_W)/2;
  const LAYOUT_OFFSET_Y = (BOARD_H - LAYOUT_H)/2;
  const CARD_DEFAULT_W = 170;
  const CARD_REF_W = 170, CARD_REF_H = 120;
  const COMMENT_W = 180, COMMENT_H = 80;

  // ========= DOM =========
  const viewport = document.getElementById('viewport');
  const board = document.getElementById('board');
  const svg = document.getElementById('links');
  const bgLayout = document.getElementById('bgLayout');
  const boardTitle = document.getElementById('boardTitle');
  const readOnlyBadge = document.getElementById('readOnlyBadge');
  const commentModeBtn = document.getElementById('commentModeBtn');
  const zoomInBtn = document.getElementById('zoomInBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');
  const zoomResetBtn = document.getElementById('zoomResetBtn');
  const zoomLevel = document.getElementById('zoomLevel');
  const boardStatusEl = document.getElementById('boardStatus');
  const boardStatusText = document.getElementById('boardStatusText');
  const commentStatusEl = document.getElementById('commentStatus');
  const commentStatusText = document.getElementById('commentStatusText');
  const configBtn = document.getElementById('configBtn');
  const minimap = document.getElementById('minimap');
  const minimapSvg = document.getElementById('minimapSvg');
  const toastEl = document.getElementById('toast');
  const modeHint = document.getElementById('modeHint');
  const loaderEl = document.getElementById('loader');
  const loaderText = document.getElementById('loaderText');

  bgLayout.setAttribute('width', LAYOUT_W);
  bgLayout.setAttribute('height', LAYOUT_H);
  bgLayout.setAttribute('viewBox', `0 0 ${LAYOUT_W} ${LAYOUT_H}`);
  bgLayout.style.left = LAYOUT_OFFSET_X + 'px';
  bgLayout.style.top = LAYOUT_OFFSET_Y + 'px';
  bgLayout.innerHTML = `
    <path class="layout-stroke" d="M 830 500 A 414 414 0 0 1 1658 500" />
    <line class="layout-stroke" x1="0" y1="500" x2="${LAYOUT_W}" y2="500" />
    <polyline class="layout-stroke" points="830,500 1244,1540 1658,500" />
    <text class="layout-label" x="1244" y="60" text-anchor="middle">value proposition</text>
    <text class="layout-label" x="820" y="485" text-anchor="end">market risks</text>
    <text class="layout-label" x="900" y="530" text-anchor="middle">competition</text>
    <text class="layout-label" x="1244" y="530" text-anchor="middle">customers</text>
    <text class="layout-label" x="1664" y="530" text-anchor="middle">influencer</text>
  `;
  svg.setAttribute('width', BOARD_W);
  svg.setAttribute('height', BOARD_H);

  // ========= STATE =========
  let config = loadConfig();
  let userName = loadUserName();
  let whiteboardData = { cards:[], links:[], showBg:true, view:null };
  let comments = [];
  let commentMode = false;
  let boardPollTimer = null;
  let modalEl = null;
  let toastTimer = null;
  let previewEl = null;
  let view = { scale: 1, tx: 0, ty: 0 };
  let ownCommentIds = new Set(loadOwnCommentIds());

  function loadConfig(){
    // URL-Parameter haben Vorrang
    const urlConfig = parseUrlConfig();
    if(urlConfig) return urlConfig;
    try{
      const raw = localStorage.getItem(STORAGE_KEY_CONFIG);
      return raw ? JSON.parse(raw) : null;
    }catch{ return null; }
  }
  function saveConfig(){
    try{ localStorage.setItem(STORAGE_KEY_CONFIG, JSON.stringify(config)); }catch{}
  }
  function parseUrlConfig(){
    const params = new URLSearchParams(location.search);
    const boardGist = params.get('board');
    const cmtGist = params.get('cgist');
    const cmtToken = params.get('ctoken');
    const boardToken = params.get('btoken');
    const title = params.get('title');
    if(!boardGist && !cmtGist) return null;
    return {
      boardGistId: boardGist || null,
      boardReadToken: boardToken || null,
      commentGistId: cmtGist || null,
      commentToken: cmtToken || null,
      boardTitle: title || 'Whiteboard',
    };
  }
  function loadUserName(){
    try{ return localStorage.getItem(STORAGE_KEY_NAME) || ''; }
    catch{ return ''; }
  }
  function saveUserName(name){
    try{ localStorage.setItem(STORAGE_KEY_NAME, name); userName = name; }catch{}
  }
  function loadOwnCommentIds(){
    try{
      const raw = localStorage.getItem('whiteboard_viewer_v1_own');
      return raw ? JSON.parse(raw) : [];
    }catch{ return []; }
  }
  function saveOwnCommentIds(){
    try{ localStorage.setItem('whiteboard_viewer_v1_own', JSON.stringify([...ownCommentIds])); }catch{}
  }

  // ========= TOAST =========
  function toast(msg, type){
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (type ? ' '+type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2800);
  }

  // ========= VIEW =========
  function clampScale(s){ return Math.min(3, Math.max(0.15, s)); }
  function applyView(){
    const {scale,tx,ty} = view;
    board.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    viewport.style.backgroundPosition = `${tx}px ${ty}px`;
    viewport.style.backgroundSize = `${24*scale}px ${24*scale}px`;
    zoomLevel.textContent = Math.round(scale*100)+'%';
    renderMinimap();
  }
  function fitLayoutToView(){
    const r = viewport.getBoundingClientRect();
    const margin = 80;
    const availW = Math.max(200, r.width - margin*2);
    const availH = Math.max(200, r.height - margin*2);
    const scale = clampScale(Math.min(availW/LAYOUT_W, availH/LAYOUT_H));
    const cx = LAYOUT_OFFSET_X + LAYOUT_W/2, cy = LAYOUT_OFFSET_Y + LAYOUT_H/2;
    view = { scale, tx: r.width/2 - cx*scale, ty: r.height/2 - cy*scale };
    applyView();
  }
  function zoomAt(factor, cx, cy){
    const ns = clampScale(view.scale*factor);
    const k = ns / view.scale;
    view.tx = cx - (cx - view.tx)*k; view.ty = cy - (cy - view.ty)*k;
    view.scale = ns; applyView();
  }
  function toBoard(clientX, clientY){
    const r = viewport.getBoundingClientRect();
    const {scale,tx,ty} = view;
    return { x:(clientX-r.left-tx)/scale, y:(clientY-r.top-ty)/scale };
  }

  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    zoomAt(Math.pow(1.0015, -e.deltaY), e.clientX-rect.left, e.clientY-rect.top);
  }, {passive:false});
  zoomInBtn.addEventListener('click', ()=>{const r=viewport.getBoundingClientRect(); zoomAt(1.2, r.width/2, r.height/2);});
  zoomOutBtn.addEventListener('click', ()=>{const r=viewport.getBoundingClientRect(); zoomAt(1/1.2, r.width/2, r.height/2);});
  zoomResetBtn.addEventListener('click', fitLayoutToView);

  // ========= PAN =========
  let panPending=null, pan=null;
  viewport.addEventListener('mousedown', (e)=>{
    if(e.button !== 0 && e.button !== 1) return;
    if(e.target.closest('.comment-note')) return;
    if(commentMode && e.button === 0){
      // Im Kommentar-Modus: Linksklick = Kommentar setzen (außer auf Notizen)
      return;
    }
    panPending = { x:e.clientX, y:e.clientY, tx:view.tx, ty:view.ty };
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e)=>{
    if(panPending && !pan){
      if(Math.abs(e.clientX-panPending.x) > 4 || Math.abs(e.clientY-panPending.y) > 4){
        pan = panPending;
        viewport.classList.add('panning');
      }
    }
    if(pan){
      view.tx = pan.tx + (e.clientX - pan.x);
      view.ty = pan.ty + (e.clientY - pan.y);
      applyView();
    }
    if(commentMode && !pan) updatePreview(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', (e)=>{
    const wasPanning = !!pan;
    if(pan){ pan=null; viewport.classList.remove('panning'); }
    const hadPending = !!panPending;
    panPending = null;
    if(!wasPanning && hadPending && commentMode && e.button === 0){
      if(!e.target.closest('.comment-note') && !e.target.closest('.toolbar') && !e.target.closest('.minimap')){
        const p = toBoard(e.clientX, e.clientY);
        openCommentCreateDialog(p);
      }
    }
  });

  // ========= BG POINTER TRACKING =========
  let lastMouse = { x: null, y: null };
  viewport.addEventListener('mousemove', (e)=>{ lastMouse.x=e.clientX; lastMouse.y=e.clientY; });

  // ========= COMMENT MODE =========
  function setCommentMode(on){
    commentMode = on;
    viewport.classList.toggle('comment-mode', on);
    commentModeBtn.classList.toggle('active', on);
    modeHint.classList.toggle('show', on);

  // ========= CARD/COMMENT RENDER =========
  function cardRect(card){
    const w = card.w || CARD_DEFAULT_W;
    const h = card.h || 120;
    return {x:card.x, y:card.y, w, h, cx:card.x+w/2, cy:card.y+h/2};
  }
  function sideAnchorPoint(card, side){
    const r = cardRect(card);
    switch(side){
      case 'top':    return {x:r.cx, y:r.y};
      case 'right':  return {x:r.x+r.w, y:r.cy};
      case 'bottom': return {x:r.cx, y:r.y+r.h};
      case 'left':   return {x:r.x, y:r.cy};
    }
    return {x:r.cx, y:r.cy};
  }
  function cardEdgeAnchor(card, toward){
    const r = cardRect(card);
    const dx = toward.x - r.cx, dy = toward.y - r.cy;
    if(dx===0 && dy===0) return {x:r.cx, y:r.cy};
    const scale = 1 / Math.max(Math.abs(dx)/(r.w/2), Math.abs(dy)/(r.h/2));
    return { x:r.cx + dx*scale, y:r.cy + dy*scale };
  }
  function dirForSide(side){
    switch(side){ case 'top':return {x:0,y:-1}; case 'right':return {x:1,y:0}; case 'bottom':return {x:0,y:1}; case 'left':return {x:-1,y:0}; }
    return null;
  }
  function bezierPathDirected(pA, sideA, pB, sideB){
    const dist = Math.hypot(pB.x-pA.x, pB.y-pA.y);
    const curve = Math.min(260, Math.max(60, dist*0.45));
    let dA = dirForSide(sideA), dB = sideB ? dirForSide(sideB) : null;
    if(!dA){ const dx=pB.x-pA.x, dy=pB.y-pA.y; dA = Math.abs(dx)>=Math.abs(dy) ? {x:Math.sign(dx)||1,y:0} : {x:0,y:Math.sign(dy)||1}; }
    if(!dB){ const dx=pA.x-pB.x, dy=pA.y-pB.y; dB = Math.abs(dx)>=Math.abs(dy) ? {x:Math.sign(dx)||1,y:0} : {x:0,y:Math.sign(dy)||1}; }
    const c1 = { x: pA.x + dA.x*curve, y: pA.y + dA.y*curve };
    const c2 = { x: pB.x + dB.x*curve, y: pB.y + dB.y*curve };
    return `M ${pA.x} ${pA.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${pB.x} ${pB.y}`;
  }

  function renderBoard(){
    [...board.querySelectorAll('.card')].forEach(n=>n.remove());
    [...svg.querySelectorAll('path.link')].forEach(n=>n.remove());
    bgLayout.style.display = whiteboardData.showBg !== false ? '' : 'none';

    whiteboardData.cards.forEach(c => renderCard(c));
    whiteboardData.links.forEach(l => {
      const a = whiteboardData.cards.find(x=>x.id===l.a);
      const b = whiteboardData.cards.find(x=>x.id===l.b);
      if(!a || !b) return;
      let pA, pB;
      if(l.sideA) pA = sideAnchorPoint(a, l.sideA);
      else { const rB = cardRect(b); pA = cardEdgeAnchor(a, {x:rB.cx, y:rB.cy}); }
      if(l.sideB) pB = sideAnchorPoint(b, l.sideB);
      else { const rA = cardRect(a); pB = cardEdgeAnchor(b, {x:rA.cx, y:rA.cy}); }
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('class','link');
      path.setAttribute('d', bezierPathDirected(pA, l.sideA, pB, l.sideB));
      svg.appendChild(path);
    });
    renderMinimap();
  }

      wrap.appendChild(img);

        const cap = document.createElement('div');

        cap.textContent = card.caption;
        wrap.appendChild(cap);

  function formatRelativeTime(ts){
    const diff = Date.now() - ts;
    const mins = Math.floor(diff/60000);
    if(mins < 1) return 'gerade eben';
    if(mins < 60) return mins+' Min';
    const hours = Math.floor(mins/60);
    if(hours < 24) return hours+' Std';
    const days = Math.floor(hours/24);
    if(days < 30) return days+' Tag' + (days>1?'e':'');
    return new Date(ts).toLocaleDateString();
  }

  // ========= MINI-MAP =========
  function renderMinimap(){
    let minX = LAYOUT_OFFSET_X, minY = LAYOUT_OFFSET_Y;
    let maxX = LAYOUT_OFFSET_X + LAYOUT_W, maxY = LAYOUT_OFFSET_Y + LAYOUT_H;
    whiteboardData.cards.forEach(c=>{
      const r = cardRect(c);
      if(r.x < minX) minX = r.x;
      if(r.y < minY) minY = r.y;
      if(r.x + r.w > maxX) maxX = r.x + r.w;
      if(r.y + r.h > maxY) maxY = r.y + r.h;
    });
    const vpRect = viewport.getBoundingClientRect();
    const vX = -view.tx/view.scale, vY = -view.ty/view.scale;
    const vW = vpRect.width/view.scale, vH = vpRect.height/view.scale;
    minX = Math.min(minX, vX); minY = Math.min(minY, vY);
    maxX = Math.max(maxX, vX + vW); maxY = Math.max(maxY, vY + vH);
    const pad = 150;
    minX -= pad; minY -= pad; maxX += pad; maxY += pad;
    const bw = maxX - minX, bh = maxY - minY;
    minimapSvg.setAttribute('viewBox', `${minX} ${minY} ${bw} ${bh}`);
    let html = '';
    if(whiteboardData.showBg !== false){
      html += `<g transform="translate(${LAYOUT_OFFSET_X},${LAYOUT_OFFSET_Y})">
        <path class="mm-layout" d="M 830 500 A 414 414 0 0 1 1658 500" />
        <line class="mm-layout" x1="0" y1="500" x2="${LAYOUT_W}" y2="500" />
        <polyline class="mm-layout" points="830,500 1244,1540 1658,500" />
      </g>`;
    }
    whiteboardData.cards.forEach(c=>{
      const r = cardRect(c);
      const fill = c.image ? '#222' : (c.color || '#FFE066');
      html += `<rect class="mm-card" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" rx="4" fill="${fill}"/>`;
    });
    comments.forEach(c=>{
      html += `<rect class="mm-comment" x="${c.x}" y="${c.y}" width="${COMMENT_W}" height="${COMMENT_H}" rx="2"/>`;
    });
    html += `<rect class="mm-viewport" x="${vX}" y="${vY}" width="${vW}" height="${vH}" rx="2"/>`;
    minimapSvg.innerHTML = html;
    minimapSvg.dataset.vb = JSON.stringify({minX,minY,bw,bh});
  }

  let mmDrag = false;
  function mmPointToBoard(e){
    const r = minimap.getBoundingClientRect();
    const vb = JSON.parse(minimapSvg.dataset.vb||'null'); if(!vb) return null;
    const fx = (e.clientX - r.left)/r.width, fy = (e.clientY - r.top)/r.height;
    return { x: vb.minX + fx*vb.bw, y: vb.minY + fy*vb.bh };
  }
  function mmCenterOn(p){
    const vpRect = viewport.getBoundingClientRect();
    view.tx = vpRect.width/2 - p.x*view.scale;
    view.ty = vpRect.height/2 - p.y*view.scale;
    applyView();
  }
  minimap.addEventListener('mousedown', (e)=>{
    e.preventDefault(); e.stopPropagation();
    mmDrag = true;
    const p = mmPointToBoard(e); if(p) mmCenterOn(p);
  });
  window.addEventListener('mousemove', (e)=>{ if(mmDrag){ const p = mmPointToBoard(e); if(p) mmCenterOn(p); } });
  window.addEventListener('mouseup', ()=>{ mmDrag = false; });

  // ========= MODAL =========
  function closeModal(){ if(modalEl){ modalEl.remove(); modalEl = null; } }
  function showModal(title, bodyFn, primaryLabel, primaryAction, extraButtons){
    closeModal();
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.addEventListener('click', (e)=>{ if(e.target === backdrop) closeModal(); });
    const box = document.createElement('div');
    box.className = 'modal';
    const h = document.createElement('h2'); h.textContent = title; box.appendChild(h);
    const body = document.createElement('div'); box.appendChild(body);
    bodyFn(body);
    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    if(extraButtons){
      extraButtons.forEach(btnDef => {
        const b = document.createElement('button');
        b.textContent = btnDef.label;
        if(btnDef.danger) b.classList.add('danger');
        b.addEventListener('click', ()=> btnDef.action(box));
        actions.appendChild(b);
      });
    }
    const cancel = document.createElement('button'); cancel.textContent = 'Schließen'; cancel.addEventListener('click', closeModal); actions.appendChild(cancel);
    if(primaryLabel){
      const ok = document.createElement('button'); ok.textContent = primaryLabel;
      ok.classList.add(primaryLabel.toLowerCase().includes('löschen') ? 'danger' : 'primary');
      ok.addEventListener('click', ()=> primaryAction(box));
      actions.appendChild(ok);
    }
    box.appendChild(actions);
    backdrop.appendChild(box);
    document.body.appendChild(backdrop);
    modalEl = backdrop;
    return box;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  // ========= COMMENT CREATE =========
  function openCommentCreateDialog(boardPoint){
    const x = Math.max(0, boardPoint.x - COMMENT_W/2);
    const y = Math.max(0, boardPoint.y - COMMENT_H/2);
    showModal('Neuer Kommentar', (body)=>{
      body.innerHTML = `
        <p>Dein Name (optional):</p>
        <input type="text" id="authorInput" placeholder="z.B. Max" value="${escapeHtml(userName)}" maxlength="40" />
        <p>Kommentar (max. ${COMMENT_MAX_LENGTH} Zeichen):</p>

        <div class="char-counter" id="counter">0 / ${COMMENT_MAX_LENGTH}</div>
      `;
      const textEl = body.querySelector('#textInput');
      const counter = body.querySelector('#counter');
      const update = ()=>{
        const len = textEl.value.length;
        counter.textContent = len+' / '+COMMENT_MAX_LENGTH;
        counter.classList.toggle('warn', len > COMMENT_MAX_LENGTH*0.8 && len <= COMMENT_MAX_LENGTH);
        counter.classList.toggle('err', len > COMMENT_MAX_LENGTH);
      };

      setTimeout(()=>textEl.focus(), 50);
    }, 'Kommentar posten', async (box)=>{

      const text = box.querySelector('#textInput').value.trim();
      if(!text){ alert('Bitte Kommentartext eingeben'); return; }
      if(text.length > COMMENT_MAX_LENGTH){ alert('Kommentar zu lang (max. '+COMMENT_MAX_LENGTH+' Zeichen)'); return; }
      if(author) saveUserName(author);
      closeModal();
      await postComment({ x, y, text, author });
    });

  async function postComment({x, y, text, author}){
    const id = 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const newComment = {
      id, x: Math.round(x), y: Math.round(y),
      text, author: author || '',
      timestamp: Date.now(),
    };
    setCommentStatus('syncing','Sende...');
    // Zuerst lokal anzeigen (optimistisch)
    comments.push(newComment);
    ownCommentIds.add(id);
    saveOwnCommentIds();
    renderComments();

    try{
      // Neu laden, um Konflikte zu minimieren (andere könnten gleichzeitig posten)
      await loadComments(true);
      if(!comments.find(c=>c.id===id)){
        comments.push(newComment);
      }
      await writeComments();
      setCommentStatus('ok', comments.length + ' Kommentar(e)');
      toast('Kommentar gespeichert', 'success');
    }catch(err){
      // Rollback
      comments = comments.filter(c=>c.id!==id);
      ownCommentIds.delete(id);
      saveOwnCommentIds();
      renderComments();
      setCommentStatus('err','Fehler');
      toast('Senden fehlgeschlagen: '+err.message, 'error');
    }
  }

  function confirmDeleteOwnComment(c){
    showModal('Eigenen Kommentar löschen?', (body)=>{
      body.innerHTML = `<div class="confirm-warn">Dein Kommentar wird endgültig aus dem Kommentar-Gist entfernt.</div>`;
    }, 'Löschen', async ()=>{
      closeModal();
      setCommentStatus('syncing','Lösche...');
      const before = [...comments];
      comments = comments.filter(x=>x.id!==c.id);
      ownCommentIds.delete(c.id);
      saveOwnCommentIds();
      renderComments();
      try{
        await writeComments();
        setCommentStatus('ok', comments.length + ' Kommentar(e)');
        toast('Kommentar gelöscht');
      }catch(err){
        comments = before;
        ownCommentIds.add(c.id);
        saveOwnCommentIds();
        renderComments();
        setCommentStatus('err','Fehler');
        toast('Löschen fehlgeschlagen', 'error');
      }
    });
  }

  function showCommentDetail(c){
    const when = c.timestamp ? new Date(c.timestamp).toLocaleString() : 'Unbekannt';
    const extra = ownCommentIds.has(c.id) ? [
      { label:'Löschen', danger:true, action:()=>{ closeModal(); confirmDeleteOwnComment(c); } }
    ] : null;
    showModal(c.author ? 'Kommentar von '+c.author : 'Anonymer Kommentar', (body)=>{
      body.innerHTML = `
        <div class="comment-detail">${escapeHtml(c.text || '')}</div>
        <div class="comment-detail-meta">
          ${c.author ? '<b>Autor:</b> '+escapeHtml(c.author)+' · ' : ''}
          <b>Erstellt:</b> ${when}
          ${ownCommentIds.has(c.id) ? ' · <i>dein Kommentar</i>' : ''}
        </div>
      `;
    }, null, null, extra);
  }

  // ========= GITHUB API =========
  async function fetchGistPublic(gistId){
    // Public Read ohne Token (funktioniert bei public Gists; für secret Gists braucht es Token)
    const res = await fetch('https://api.github.com/gists/'+gistId, {
      headers: {'Accept':'application/vnd.github+json'}
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.json();
  }
  async function fetchGistWithToken(gistId, token){
    const res = await fetch('https://api.github.com/gists/'+gistId, {
      headers: {
        'Accept':'application/vnd.github+json',
        'Authorization':'Bearer '+token,
        'X-GitHub-Api-Version':'2022-11-28',
      }
    });
    if(!res.ok){
      const text = await res.text().catch(()=>'');
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }
  async function patchGist(gistId, token, fileName, content){
    const res = await fetch('https://api.github.com/gists/'+gistId, {
      method:'PATCH',
      headers:{
        'Accept':'application/vnd.github+json',
        'Authorization':'Bearer '+token,
        'Content-Type':'application/json',
        'X-GitHub-Api-Version':'2022-11-28',
      },
      body: JSON.stringify({ files: { [fileName]: { content } } })
    });
    if(!res.ok){
      const text = await res.text().catch(()=>'');
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }

  async function readFileFromGist(gist, fileName){
    const file = gist.files && gist.files[fileName];
    if(!file) return null;
    let content = file.content;
    if(file.truncated && file.raw_url){
      const res = await fetch(file.raw_url);
      content = await res.text();
    }
    return content;
  }

  // ========= LOAD WHITEBOARD =========
  async function loadWhiteboard(silent){
    if(!config || !config.boardGistId){
      setBoardStatus('err','Kein Board konfiguriert');
      return;
    }
    if(!silent) setBoardStatus('syncing','Lade Board...');
    try{
      let gist;
      if(config.boardReadToken){
        gist = await fetchGistWithToken(config.boardGistId, config.boardReadToken);
      } else {
        gist = await fetchGistPublic(config.boardGistId);
      }
      const content = await readFileFromGist(gist, 'whiteboard.json');
      if(!content){ setBoardStatus('err','whiteboard.json nicht gefunden'); return; }
      const data = JSON.parse(content);
      whiteboardData = {
        cards: Array.isArray(data.cards) ? data.cards : [],
        links: Array.isArray(data.links) ? data.links : [],
        showBg: data.showBg !== false,
        view: data.view || null,
        lastModified: data.lastModified || 0,
      };
      if(!silent && whiteboardData.view){
        view = { scale: whiteboardData.view.scale, tx: whiteboardData.view.tx, ty: whiteboardData.view.ty };
        applyView();
      }
      renderBoard();
      setBoardStatus('ok', whiteboardData.cards.length+' Karten');
    }catch(err){
      console.error(err);
      setBoardStatus('err', 'Fehler: '+(err.message||'').slice(0,30));
      if(!silent) toast('Board laden fehlgeschlagen: '+err.message, 'error');
    }
  }

  async function loadComments(silent){
    if(!config || !config.commentGistId || !config.commentToken){
      setCommentStatus('err','Nicht konfiguriert');
      return;
    }
    if(!silent) setCommentStatus('syncing','Lade...');
    try{
      const gist = await fetchGistWithToken(config.commentGistId, config.commentToken);
      const content = await readFileFromGist(gist, 'comments.json');
      if(!content){ comments = []; }
      else {
        try{
          const data = JSON.parse(content);
          comments = Array.isArray(data.comments) ? data.comments : [];
        }catch{ comments = []; }
      }
      renderComments();
      setCommentStatus('ok', comments.length+' Kommentar(e)');
    }catch(err){
      console.error(err);
      setCommentStatus('err','Fehler');
      if(!silent) toast('Kommentare laden fehlgeschlagen: '+err.message, 'error');
    }
  }

  async function writeComments(){
    if(!config || !config.commentGistId || !config.commentToken) throw new Error('Nicht konfiguriert');
    const json = JSON.stringify({ comments }, null, 2);
    await patchGist(config.commentGistId, config.commentToken, 'comments.json', json);
  }

  function setBoardStatus(kind, text){
    boardStatusEl.classList.remove('ok','err','syncing');
    if(kind) boardStatusEl.classList.add(kind);
    boardStatusText.textContent = 'Board: '+text;
  }
  function setCommentStatus(kind, text){
    commentStatusEl.classList.remove('ok','err','syncing');
    if(kind) commentStatusEl.classList.add(kind);
    commentStatusText.textContent = 'Kommentare: '+text;
  }

  // ========= POLLING =========
  function startPolling(){
    stopPolling();
    if(!config) return;
    boardPollTimer = setInterval(async ()=>{
      await loadWhiteboard(true);
      if(config.commentGistId && config.commentToken){
        await loadComments(true);
      }
    }, POLL_INTERVAL);
  }
  function stopPolling(){
    if(boardPollTimer){ clearInterval(boardPollTimer); boardPollTimer = null; }
  }

  function openConfigModal(){
    const c = config || {};
    showModal('Viewer-Konfiguration', (body)=>{
      body.innerHTML = `
        <p><b>Whiteboard-Quelle</b> (Read-Only)</p>
        <p class="small">Gist-ID des Whiteboard-Gists. Bei Secret Gist: Read-Token erforderlich.</p>
        <input type="text" id="boardGistInput" placeholder="Whiteboard-Gist-ID" value="${escapeHtml(c.boardGistId || '')}" />
        <input type="password" id="boardTokenInput" placeholder="Read-Token (nur bei Secret Gist)" value="${escapeHtml(c.boardReadToken || '')}" autocomplete="off" />

        <p style="margin-top:16px"><b>Kommentar-Backend</b></p>
        <p class="small">Separater GitHub-Account empfohlen! Token wird für Kommentare verwendet.</p>
        <input type="text" id="cmtGistInput" placeholder="Kommentar-Gist-ID" value="${escapeHtml(c.commentGistId || '')}" />
        <input type="password" id="cmtTokenInput" placeholder="Kommentar-Token" value="${escapeHtml(c.commentToken || '')}" autocomplete="off" />

        <p style="margin-top:16px"><b>Titel</b> (optional)</p>
        <input type="text" id="titleInput" placeholder="Board-Titel" value="${escapeHtml(c.boardTitle || '')}" maxlength="60" />

        <p style="margin-top:16px" class="small">
          <b>Teilen via URL:</b> Du kannst Parameter auch per URL übergeben:<br>
          <code>?board=GIST_ID&cgist=CMT_GIST&ctoken=CMT_TOKEN&title=Mein+Board</code>
        </p>
        <p class="small">⚠ Token in URL ist <b>nicht sicher</b>. Besser: Nutzer geben Konfiguration selbst ein.</p>
      `;
    }, 'Speichern', async (box)=>{
      const newConfig = {
        boardGistId: box.querySelector('#boardGistInput').value.trim() || null,
        boardReadToken: box.querySelector('#boardTokenInput').value.trim() || null,
        commentGistId: box.querySelector('#cmtGistInput').value.trim() || null,
        commentToken: box.querySelector('#cmtTokenInput').value.trim() || null,
        boardTitle: box.querySelector('#titleInput').value.trim() || 'Whiteboard',
      };
      if(!newConfig.boardGistId){ alert('Mindestens Whiteboard-Gist-ID erforderlich'); return; }
      config = newConfig;
      saveConfig();
      closeModal();
      applyConfigTitle();
      await loadWhiteboard();
      if(config.commentGistId && config.commentToken) await loadComments();
      startPolling();
      toast('Konfiguration gespeichert', 'success');
    }, (c.boardGistId || c.commentGistId) ? [
      { label:'Konfiguration löschen', danger:true, action:()=>{
          showModal('Konfiguration löschen?', (body)=>{
            body.innerHTML = `<div class="confirm-warn">Alle Einstellungen werden entfernt. Eigene Kommentare bleiben im Gist.</div>`;
          }, 'Löschen', ()=>{
            try{ localStorage.removeItem(STORAGE_KEY_CONFIG); }catch{}
            config = null;
            closeModal();
            location.reload();
          });
        }}
    ] : null);
  }

  function applyConfigTitle(){
    if(config && config.boardTitle){
      boardTitle.textContent = config.boardTitle;
      document.title = config.boardTitle + ' · Viewer';
    } else {
      boardTitle.textContent = 'Whiteboard Viewer';
    }
  }

  // ========= INIT =========
  async function init(){
    fitLayoutToView();
    loaderEl.style.display = 'none';

    if(!config || !config.boardGistId){
      setBoardStatus('err','Nicht konfiguriert');
      setCommentStatus('err','Nicht konfiguriert');
      toast('Bitte Konfiguration eingeben (⚙)', 'error');
      setTimeout(openConfigModal, 600);
      return;
    }

    applyConfigTitle();
    loaderEl.style.display = 'flex';
    loaderText.textContent = 'Lade Whiteboard...';
    await loadWhiteboard();
    if(config.commentGistId && config.commentToken){
      loaderText.textContent = 'Lade Kommentare...';
      await loadComments();
    } else {
      setCommentStatus('err','Nicht konfiguriert');
    }
    loaderEl.style.display = 'none';
    startPolling();
  }

  window.addEventListener('resize', ()=>{ renderMinimap(); });

  init();

  console.log('Viewer v1 initialisiert', {
    config: !!config,
    boardGist: config?.boardGistId,
    commentsConfigured: !!(config?.commentGistId && config?.commentToken),
  });

  } catch (err) {
    console.error('Viewer Init-Fehler:', err);
    document.getElementById('loader').innerHTML =
      '<div style="color:#e53935;text-align:center"><h3>Fehler beim Start</h3><p>'+err.message+'</p></div>';
  }
})();
</script>
</body>
</html>
