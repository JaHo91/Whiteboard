<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Whiteboard Viewer</title>
<style>
  :root{
    --bg:#f4f5f7;
    --toolbar:#ffffff;
    --card-shadow:0 2px 6px rgba(0,0,0,.12);
    --anchor:#2b7fff;
    --danger:#e53935;
    --success:#2e7d32;
    --warning:#f57c00;
    --comment:#ffd54f;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#222;background:var(--bg);overflow:hidden}

  .toolbar{
    position:fixed;top:0;left:0;right:0;height:48px;
    background:var(--toolbar);border-bottom:1px solid #e4e6eb;
    display:flex;align-items:center;gap:8px;padding:0 12px;z-index:20;
  }
  .toolbar button{
    font-size:13px;padding:6px 10px;border:1px solid #d0d4da;background:#fff;border-radius:6px;cursor:pointer;
  }
  .toolbar button:hover{background:#f0f2f5}
  .toolbar button.active{background:#ffd54f;color:#222;border-color:#f9a825}
  .toolbar .title{font-weight:600;font-size:14px;margin-right:8px}
  .toolbar .badge{
    font-size:11px;padding:2px 8px;border-radius:10px;background:#e3f2fd;color:#1565c0;
  }
  .toolbar .spacer{flex:1}
  .zoom-group{display:flex;align-items:center;gap:4px;border:1px solid #d0d4da;border-radius:6px;padding:2px;background:#fff}
  .zoom-group button{border:none;padding:4px 8px}
  #zoomLevel{font-size:12px;min-width:48px;text-align:center;color:#444}
  .sync-status{
    display:flex;align-items:center;gap:6px;font-size:12px;color:#666;
    padding:4px 10px;border:1px solid #d0d4da;border-radius:6px;background:#fff;
  }
  .sync-status .dot{width:8px;height:8px;border-radius:50%;background:#bbb}
  .sync-status.ok .dot{background:var(--success)}
  .sync-status.syncing .dot{background:var(--anchor);animation:pulse 1s infinite}
  .sync-status.error .dot{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .viewport{
    position:absolute;inset:48px 0 0 0;overflow:hidden;background:var(--bg);
    background-image:radial-gradient(circle, #dfe1e5 1px, transparent 1px);
    background-size:24px 24px;background-position:0 0;
    cursor:grab;
  }
  .viewport.panning{cursor:grabbing}
  body.comment-mode .viewport{cursor:crosshair}

  .board{
    position:absolute;left:0;top:0;width:8000px;height:6000px;
    transform-origin:0 0;will-change:transform;
  }

  svg.bg-layout{position:absolute;pointer-events:none;opacity:.85}
  svg.bg-layout .layout-stroke{fill:none;stroke:#222;stroke-width:3;vector-effect:non-scaling-stroke}
  svg.bg-layout .layout-label{font-family:system-ui,-apple-system,sans-serif;font-size:28px;fill:#222;font-weight:500}

  svg.links{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}
  svg.links path.link{fill:none;stroke:#9aa0a6;stroke-width:2.2;opacity:.85}

  .card{
    position:absolute;width:170px;min-width:60px;min-height:60px;border-radius:10px;
    background:#fff;box-shadow:var(--card-shadow);display:flex;flex-direction:column;
    --card-font-scale:1;
    transition:outline-color .15s, box-shadow .15s;
    outline:2px solid transparent;
  }
  body.comment-mode .card{cursor:crosshair}
  body.comment-mode .card:hover{outline-color:var(--comment);box-shadow:0 4px 14px rgba(249,168,37,.4)}

  .card .title{
    padding:10px;font-weight:600;
    font-size:calc(14px * var(--card-font-scale));
    line-height:1.25;min-height:calc(40px * var(--card-font-scale));
    color:#222;border-radius:10px 10px 0 0;flex:0 0 auto;
    word-break:break-word;
  }
  .card .details{
    padding:10px;background:#fff;
    font-size:calc(13px * var(--card-font-scale));
    line-height:1.35;min-height:calc(40px * var(--card-font-scale));
    white-space:pre-wrap;word-break:break-word;
    border-top:1px solid rgba(0,0,0,.06);border-radius:0 0 10px 10px;
    flex:1 1 auto;overflow:hidden;
  }
  .card.image-card{background:#222;overflow:hidden;padding:0}
  .card.image-card .title,.card.image-card .details{display:none}
  .card.image-card .image-wrap{
    position:relative;flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    border-radius:10px;overflow:hidden;background:#222;
  }
  .card.image-card img{display:block;width:100%;height:100%;object-fit:contain}

  /* Kommentar-Marker */
  .comment-marker{
    position:absolute;width:28px;height:28px;border-radius:50%;
    background:var(--comment);border:2px solid #f9a825;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;cursor:pointer;z-index:10;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    transition:transform .15s;
  }
  .comment-marker:hover{transform:scale(1.15)}
  .comment-marker .count{
    position:absolute;top:-4px;right:-4px;
    background:#e53935;color:#fff;font-size:10px;
    width:16px;height:16px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:600;border:1.5px solid #fff;
  }

  /* Kommentar-Dialog */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;
    display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .modal{
    background:#fff;border-radius:10px;padding:20px;max-width:500px;width:100%;
    max-height:90vh;overflow-y:auto;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
  }
  .modal h2{margin:0 0 12px 0;font-size:18px}
  .modal p{margin:8px 0;font-size:13px;color:#555;line-height:1.5}
  .modal label{display:block;font-size:12px;color:#666;margin:10px 0 4px;font-weight:500}
  .modal input[type=text],.modal input[type=password],.modal textarea{
    width:100%;padding:8px 10px;border:1px solid #d0d4da;border-radius:6px;
    font-size:13px;font-family:inherit;
  }
  .modal textarea{min-height:90px;resize:vertical;font-family:inherit}
  .modal .char-count{font-size:11px;color:#999;text-align:right;margin-top:2px}
  .modal .char-count.warn{color:var(--warning)}
  .modal .char-count.over{color:var(--danger)}
  .modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .modal button{padding:8px 14px;border:1px solid #d0d4da;border-radius:6px;cursor:pointer;background:#fff;font-size:13px}
  .modal button:hover{background:#f0f2f5}
  .modal button.primary{background:#2b7fff;color:#fff;border-color:#2b7fff}
  .modal button.primary:hover{background:#1f6de0}
  .modal button.primary:disabled{opacity:.5;cursor:not-allowed}
  .modal button.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
  .modal .small{font-size:11px;color:#888}
  .modal .comments-list{margin-top:12px;max-height:300px;overflow-y:auto;border-top:1px solid #eee;padding-top:10px}
  .modal .comment-item{
    background:#fffde7;border:1px solid #ffe082;border-radius:6px;
    padding:8px 10px;margin-bottom:8px;
  }
  .modal .comment-item .meta{font-size:11px;color:#888;margin-bottom:4px}
  .modal .comment-item .text{font-size:13px;line-height:1.4;white-space:pre-wrap;word-break:break-word}
  .modal .comment-item .author{font-weight:600;color:#666}

  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:#222;color:#fff;padding:8px 14px;border-radius:6px;font-size:13px;
    z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
  }
  .toast.show{opacity:1}
  .toast.error{background:var(--danger)}
  .toast.success{background:var(--success)}

  .config-overlay{
    position:fixed;inset:0;background:#f4f5f7;z-index:300;
    display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .config-box{
    background:#fff;border-radius:10px;padding:24px;max-width:500px;width:100%;
    box-shadow:0 10px 40px rgba(0,0,0,.15);
  }
  .config-box h1{margin:0 0 8px 0;font-size:22px}
  .config-box .intro{color:#666;margin:0 0 16px 0;font-size:13px;line-height:1.5}
  .config-box label{display:block;font-size:12px;color:#666;margin:12px 0 4px;font-weight:500}
  .config-box input{
    width:100%;padding:9px 10px;border:1px solid #d0d4da;border-radius:6px;
    font-size:13px;font-family:ui-monospace,monospace;
  }
  .config-box .actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
  .config-box button{padding:10px 18px;border:1px solid #d0d4da;border-radius:6px;cursor:pointer;background:#fff;font-size:13px}
  .config-box button.primary{background:#2b7fff;color:#fff;border-color:#2b7fff}
  .config-box button.primary:hover{background:#1f6de0}
  .config-box .hint{font-size:11px;color:#888;margin-top:3px}
</style>
</head>
<body>

<div class="toolbar" id="toolbar" style="display:none">
  <span class="title" id="boardTitle">📖 Viewer</span>
  <span class="badge">Nur Lesen</span>
  <button id="commentModeBtn" title="Kommentar-Modus (Klick auf Karte um Kommentar hinzuzufügen)">💬 Kommentieren</button>
  <div class="zoom-group">
    <button id="zoomOutBtn" title="Rauszoomen">−</button>
    <span id="zoomLevel">100%</span>
    <button id="zoomInBtn" title="Reinzoomen">+</button>
    <button id="zoomResetBtn" title="Auf Layout zentrieren">⟲</button>
  </div>
  <div class="spacer"></div>
  <div class="sync-status" id="syncStatus">
    <span class="dot"></span>
    <span id="syncStatusText">Lade...</span>
  </div>
  <button id="settingsBtn" title="Einstellungen">⚙</button>
</div>

<div class="viewport" id="viewport" style="display:none">
  <div class="board" id="board">
    <svg class="bg-layout" id="bgLayout" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="links" id="links" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  'use strict';

  const CONFIG_KEY = 'whiteboard_viewer_config_v1';
  const BOARD_W = 8000, BOARD_H = 6000;
  const LAYOUT_W = 2488, LAYOUT_H = 1672;
  const LAYOUT_OFFSET_X = (BOARD_W - LAYOUT_W)/2;
  const LAYOUT_OFFSET_Y = (BOARD_H - LAYOUT_H)/2;
  const POLL_INTERVAL = 30000;
  const MAX_COMMENT_LEN = 500;

  let config = loadConfig();
  let boardState = null;
  let comments = [];
  let pollTimer = null;
  let commentMode = false;
  let toastTimer = null;

  const toolbar = document.getElementById('toolbar');
  const viewport = document.getElementById('viewport');
  const board = document.getElementById('board');
  const bgLayout = document.getElementById('bgLayout');
  const svg = document.getElementById('links');
  const zoomInBtn = document.getElementById('zoomInBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');
  const zoomResetBtn = document.getElementById('zoomResetBtn');
  const zoomLevel = document.getElementById('zoomLevel');
  const commentModeBtn = document.getElementById('commentModeBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const syncStatusEl = document.getElementById('syncStatus');
  const syncStatusText = document.getElementById('syncStatusText');
  const toastEl = document.getElementById('toast');
  const boardTitle = document.getElementById('boardTitle');

  bgLayout.setAttribute('width', LAYOUT_W);
  bgLayout.setAttribute('height', LAYOUT_H);
  bgLayout.setAttribute('viewBox', `0 0 ${LAYOUT_W} ${LAYOUT_H}`);
  bgLayout.style.left = LAYOUT_OFFSET_X + 'px';
  bgLayout.style.top  = LAYOUT_OFFSET_Y + 'px';
  bgLayout.innerHTML = `
    <path class="layout-stroke" d="M 830 500 A 414 414 0 0 1 1658 500" />
    <line class="layout-stroke" x1="0" y1="500" x2="${LAYOUT_W}" y2="500" />
    <polyline class="layout-stroke" points="830,500 1244,1540 1658,500" />
    <text class="layout-label" x="1244" y="60"  text-anchor="middle">value proposition</text>
    <text class="layout-label" x="820"  y="485" text-anchor="end">market risks</text>
    <text class="layout-label" x="900"  y="530" text-anchor="middle">competition</text>
    <text class="layout-label" x="1244" y="530" text-anchor="middle">customers</text>
    <text class="layout-label" x="1664" y="530" text-anchor="middle">influencer</text>
  `;
  svg.setAttribute('width', BOARD_W);
  svg.setAttribute('height', BOARD_H);

  let view = { scale: 0.3, tx: 0, ty: 0 };

  function loadConfig(){
    try{
      const raw = localStorage.getItem(CONFIG_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch{ return null; }
  }
  function saveConfig(){
    try{ localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); }catch{}
  }

  function toast(msg, type){
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (type ? ' '+type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2500);
  }

  function setSyncStatus(kind, text){
    syncStatusEl.classList.remove('ok','syncing','error');
    if(kind) syncStatusEl.classList.add(kind);
    syncStatusText.textContent = text;
  }

  function showConfigDialog(){
    const existing = document.querySelector('.config-overlay');
    if(existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.className = 'config-overlay';
    overlay.innerHTML = `
      <div class="config-box">
        <h1>📖 Whiteboard Viewer</h1>
        <p class="intro">Bitte gib die Zugangsdaten ein, die du erhalten hast. Diese werden sicher lokal in deinem Browser gespeichert und nicht geteilt.</p>

        <label>Board-Gist-ID</label>
        <input type="text" id="cfgBoardGist" placeholder="a1b2c3d4e5f6..." value="${config?.boardGistId || ''}" />
        <div class="hint">32-stellige ID des Whiteboard-Gists</div>

        <label>Board-Token (Read-only)</label>
        <input type="password" id="cfgBoardToken" placeholder="github_pat_..." value="${config?.boardToken || ''}" />
        <div class="hint">Fine-grained Token mit "Gists: Read-only"</div>

        <label>Kommentar-Gist-ID</label>
        <input type="text" id="cfgCommentGist" placeholder="f7e6d5c4b3a2..." value="${config?.commentGistId || ''}" />
        <div class="hint">Gist-ID für Kommentare (getrennt vom Board)</div>

        <label>Kommentar-Token (Read-write)</label>
        <input type="password" id="cfgCommentToken" placeholder="github_pat_..." value="${config?.commentToken || ''}" />
        <div class="hint">Token des Kommentar-Accounts mit "Gists: Read and write"</div>

        <label>Dein Name (optional)</label>
        <input type="text" id="cfgName" placeholder="z.B. Anna" value="${config?.commenterName || ''}" />
        <div class="hint">Wird bei deinen Kommentaren angezeigt</div>

        <div class="actions">
          ${config ? '<button id="cfgCancel">Abbrechen</button>' : ''}
          <button class="primary" id="cfgSave">Speichern & Laden</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    if(config){
      document.getElementById('cfgCancel').onclick = ()=>overlay.remove();
    }
    document.getElementById('cfgSave').onclick = ()=>{
      const boardGistId = document.getElementById('cfgBoardGist').value.trim();
      const boardToken = document.getElementById('cfgBoardToken').value.trim();
      const commentGistId = document.getElementById('cfgCommentGist').value.trim();
      const commentToken = document.getElementById('cfgCommentToken').value.trim();
      const commenterName = document.getElementById('cfgName').value.trim();

      if(!boardGistId || !boardToken || !commentGistId || !commentToken){
        toast('Bitte alle Pflichtfelder ausfüllen', 'error');
        return;
      }
      config = { boardGistId, boardToken, commentGistId, commentToken, commenterName };
      saveConfig();
      overlay.remove();
      init();
    };
  }

  async function githubRequest(token, path, method, body){
    const headers = {
      'Accept':'application/vnd.github+json',
      'Authorization':'Bearer '+token,
      'X-GitHub-Api-Version':'2022-11-28',
    };
    if(body) headers['Content-Type'] = 'application/json';
    const res = await fetch('https://api.github.com'+path, {
      method, headers, body: body ? JSON.stringify(body) : undefined,
    });
    if(!res.ok){
      const text = await res.text().catch(()=>'');
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }

  async function loadBoard(){
    setSyncStatus('syncing', 'Lade Board...');
    try{
      const gist = await githubRequest(config.boardToken, '/gists/'+config.boardGistId, 'GET');
      const file = gist.files && gist.files['whiteboard.json'];
      if(!file) throw new Error('whiteboard.json nicht im Gist gefunden');
      let content = file.content;
      if(file.truncated && file.raw_url){
        const res = await fetch(file.raw_url);
        content = await res.text();
      }
      boardState = JSON.parse(content);
      renderBoard();
      setSyncStatus('ok', 'Aktuell');
      return true;
    }catch(err){
      console.error(err);
      setSyncStatus('error', 'Fehler beim Laden');
      toast('Board-Fehler: '+err.message, 'error');
      return false;
    }
  }

  async function loadComments(){
    try{
      const gist = await githubRequest(config.commentToken, '/gists/'+config.commentGistId, 'GET');
      const file = gist.files && gist.files['comments.json'];
      if(!file){
        comments = [];
        return true;
      }
      let content = file.content;
      if(file.truncated && file.raw_url){
        const res = await fetch(file.raw_url);
        content = await res.text();
      }
      try{
        const parsed = JSON.parse(content);
        comments = Array.isArray(parsed) ? parsed : (parsed.comments || []);
      }catch{ comments = []; }
      renderCommentMarkers();
      return true;
    }catch(err){
      console.error('Comments load error', err);
      toast('Kommentare konnten nicht geladen werden: '+err.message, 'error');
      return false;
    }
  }

  async function saveComments(){
    try{
      await githubRequest(config.commentToken, '/gists/'+config.commentGistId, 'PATCH', {
        files: { 'comments.json': { content: JSON.stringify(comments, null, 2) } }
      });
      return true;
    }catch(err){
      console.error(err);
      toast('Kommentar speichern fehlgeschlagen: '+err.message, 'error');
      return false;
    }
  }

  function fitLayoutToView(){
    const r = viewport.getBoundingClientRect();
    const margin = 80;
    const availW = Math.max(200, r.width - margin*2);
    const availH = Math.max(200, r.height - margin*2);
    const scale = Math.min(3, Math.max(0.15, Math.min(availW/LAYOUT_W, availH/LAYOUT_H)));
    const cx = LAYOUT_OFFSET_X + LAYOUT_W/2, cy = LAYOUT_OFFSET_Y + LAYOUT_H/2;
    view = { scale, tx: r.width/2 - cx*scale, ty: r.height/2 - cy*scale };
    applyView();
  }
  function applyView(){
    board.style.transform = `translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;
    viewport.style.backgroundPosition = `${view.tx}px ${view.ty}px`;
    viewport.style.backgroundSize = `${24*view.scale}px ${24*view.scale}px`;
    zoomLevel.textContent = Math.round(view.scale*100)+'%';
  }
  function zoomAt(factor, cx, cy){
    const ns = Math.min(3, Math.max(0.15, view.scale*factor));
    const k = ns / view.scale;
    view.tx = cx - (cx - view.tx)*k;
    view.ty = cy - (cy - view.ty)*k;
    view.scale = ns;
    applyView();
  }
  function toBoard(clientX, clientY){
    const r = viewport.getBoundingClientRect();
    return { x:(clientX-r.left-view.tx)/view.scale, y:(clientY-r.top-view.ty)/view.scale };
  }

  function renderBoard(){
    if(!boardState) return;
    [...board.querySelectorAll('.card')].forEach(n=>n.remove());
    bgLayout.style.display = boardState.showBg === false ? 'none' : '';
    (boardState.cards || []).forEach(renderCard);
    renderLinks();
  }

  function renderCard(card){
    const el = document.createElement('div');
    el.className = 'card' + (card.image ? ' image-card' : '');
    el.dataset.id = card.id;
    el.style.left = card.x+'px';
    el.style.top = card.y+'px';
    if(card.w) el.style.width = card.w+'px';
    if(card.h && !card.autoH) el.style.height = card.h+'px';

    if(card.image){
      el.style.height = (card.h || 200)+'px';
      const wrap = document.createElement('div');
      wrap.className = 'image-wrap';
      const img = document.createElement('img');
      img.src = card.image;
      img.alt = card.caption || '';
      wrap.appendChild(img);
      el.appendChild(wrap);
    } else {
      const title = document.createElement('div');
      title.className = 'title';
      title.style.background = card.color;
      title.textContent = card.title || '';
      el.appendChild(title);
      const details = document.createElement('div');
      details.className = 'details';
      details.textContent = card.details || '';
      el.appendChild(details);
    }

    const w = card.w || 170;
    const h = card.h || 120;
    const scale = Math.max(0.5, Math.min(1.6, Math.min(w/170, h/120)));
    el.style.setProperty('--card-font-scale', scale.toFixed(3));

    board.appendChild(el);
  }

  function renderLinks(){
    [...svg.querySelectorAll('path')].forEach(n=>n.remove());
    (boardState.links || []).forEach(l => {
      const a = boardState.cards.find(c=>c.id===l.a);
      const b = boardState.cards.find(c=>c.id===l.b);
      if(!a || !b) return;
      const pA = sideAnchorPoint(a, l.sideA);
      const pB = sideAnchorPoint(b, l.sideB);
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('class','link');
      path.setAttribute('d', bezierPath(pA, l.sideA, pB, l.sideB));
      svg.appendChild(path);
    });
  }

  function cardRect(card){
    const el = board.querySelector(`.card[data-id="${card.id}"]`);
    const w = el ? el.offsetWidth : (card.w || 170);
    const h = el ? el.offsetHeight : (card.h || 120);
    return {x:card.x, y:card.y, w, h, cx:card.x+w/2, cy:card.y+h/2};
  }
  function sideAnchorPoint(card, side){
    const r = cardRect(card);
    switch(side){
      case 'top': return {x:r.cx, y:r.y};
      case 'right': return {x:r.x+r.w, y:r.cy};
      case 'bottom': return {x:r.cx, y:r.y+r.h};
      case 'left': return {x:r.x, y:r.cy};
    }
    return {x:r.cx, y:r.cy};
  }
  function dirForSide(side){
    switch(side){ case 'top':return {x:0,y:-1}; case 'right':return {x:1,y:0}; case 'bottom':return {x:0,y:1}; case 'left':return {x:-1,y:0}; }
    return null;
  }
  function bezierPath(pA, sideA, pB, sideB){
    const dist = Math.hypot(pB.x-pA.x, pB.y-pA.y);
    const curve = Math.min(260, Math.max(60, dist*0.45));
    let dA = dirForSide(sideA), dB = sideB ? dirForSide(sideB) : null;
    if(!dA){ const dx=pB.x-pA.x, dy=pB.y-pA.y; dA = Math.abs(dx)>=Math.abs(dy) ? {x:Math.sign(dx)||1,y:0} : {x:0,y:Math.sign(dy)||1}; }
    if(!dB){ const dx=pA.x-pB.x, dy=pA.y-pB.y; dB = Math.abs(dx)>=Math.abs(dy) ? {x:Math.sign(dx)||1,y:0} : {x:0,y:Math.sign(dy)||1}; }
    const c1 = { x: pA.x + dA.x*curve, y: pA.y + dA.y*curve };
    const c2 = { x: pB.x + dB.x*curve, y: pB.y + dB.y*curve };
    return `M ${pA.x} ${pA.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${pB.x} ${pB.y}`;
  }

  function renderCommentMarkers(){
    [...board.querySelectorAll('.comment-marker')].forEach(n=>n.remove());
    const byCard = {};
    comments.forEach(c => {
      if(!byCard[c.cardId]) byCard[c.cardId] = [];
      byCard[c.cardId].push(c);
    });
    Object.entries(byCard).forEach(([cardId, list]) => {
      const card = boardState.cards.find(c => c.id === +cardId);
      if(!card) return;
      const r = cardRect(card);
      const marker = document.createElement('div');
      marker.className = 'comment-marker';
      marker.textContent = '💬';
      marker.style.left = (r.x + r.w - 14) + 'px';
      marker.style.top = (r.y - 14) + 'px';
      marker.dataset.cardId = cardId;
      if(list.length > 1){
        const count = document.createElement('span');
        count.className = 'count';
        count.textContent = list.length;
        marker.appendChild(count);
      }
      marker.addEventListener('click', (e) => {
        e.stopPropagation();
        showCommentsDialog(+cardId);
      });
      board.appendChild(marker);
    });
  }

  function showCommentsDialog(cardId){
    const card = boardState.cards.find(c => c.id === cardId);
    if(!card) return;
    const cardComments = comments.filter(c => c.cardId === cardId).sort((a,b)=>a.timestamp-b.timestamp);
    const title = card.image ? 'Bildkarte' : (card.title || 'Unbenannt');

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h2>💬 Kommentare zu "${escapeHtml(title)}"</h2>
        <div class="comments-list">
          ${cardComments.length ? cardComments.map(c => `
            <div class="comment-item">
              <div class="meta">
                <span class="author">${escapeHtml(c.author || 'Anonym')}</span>
                · ${new Date(c.timestamp).toLocaleString()}
              </div>
              <div class="text">${escapeHtml(c.text)}</div>
            </div>
          `).join('') : '<p class="small">Noch keine Kommentare</p>'}
        </div>
        <div class="modal-actions">
          <button id="addCommentBtn" class="primary">+ Kommentar hinzufügen</button>
          <button id="closeBtn">Schließen</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) backdrop.remove(); });
    document.getElementById('closeBtn').onclick = ()=>backdrop.remove();
    document.getElementById('addCommentBtn').onclick = ()=>{
      backdrop.remove();
      openCommentDialog(cardId);
    };
  }

  function openCommentDialog(cardId){
    const card = boardState && boardState.cards.find(c => c.id === cardId);
    if(!card){
      toast('Karte nicht gefunden', 'error');
      return;
    }
    const title = card.image ? 'Bildkarte' : (card.title || 'Unbenannt');

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h2>💬 Kommentar zu "${escapeHtml(title)}"</h2>
        <label>Name (optional)</label>
        <input type="text" id="commentAuthor" placeholder="z.B. Anna" value="${escapeHtml(config.commenterName || '')}" />
        <label>Kommentar</label>
        <textarea id="commentText" placeholder="Dein Kommentar..." maxlength="${MAX_COMMENT_LEN}"></textarea>
        <div class="char-count" id="charCount">0 / ${MAX_COMMENT_LEN}</div>
        <div class="modal-actions">
          <button id="cancelBtn">Abbrechen</button>
          <button class="primary" id="saveBtn" disabled>Speichern</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);

    const textarea = document.getElementById('commentText');
    const charCount = document.getElementById('charCount');
    const saveBtn = document.getElementById('saveBtn');
    const authorInput = document.getElementById('commentAuthor');

    textarea.focus();
    textarea.addEventListener('input', ()=>{
      const len = textarea.value.length;
      charCount.textContent = `${len} / ${MAX_COMMENT_LEN}`;
      charCount.className = 'char-count' + (len > MAX_COMMENT_LEN*0.9 ? ' warn' : '') + (len >= MAX_COMMENT_LEN ? ' over' : '');
      saveBtn.disabled = !textarea.value.trim();
    });

    backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) backdrop.remove(); });
    document.getElementById('cancelBtn').onclick = ()=>backdrop.remove();
    saveBtn.onclick = async ()=>{
      const text = textarea.value.trim();
      if(!text) return;
      const author = authorInput.value.trim();
      if(author){ config.commenterName = author; saveConfig(); }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Speichere...';

      const newComment = {
        id: Date.now() + '_' + Math.random().toString(36).slice(2,8),
        cardId,
        author: author || 'Anonym',
        text: text.slice(0, MAX_COMMENT_LEN),
        timestamp: Date.now(),
      };
      comments.push(newComment);
      const ok = await saveComments();
      if(ok){
        renderCommentMarkers();
        backdrop.remove();
        toast('Kommentar gespeichert', 'success');
      } else {
        comments = comments.filter(c => c.id !== newComment.id);
        saveBtn.disabled = false;
        saveBtn.textContent = 'Speichern';
      }
    };
  }

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  // === KOMMENTAR-MODUS CLICK-HANDLER (Capture-Phase!) ===
  // Fängt Klicks auf Karten ab, bevor andere Handler greifen
  document.addEventListener('click', (e) => {
    if(!commentMode) return;
    if(e.target.closest('.modal-backdrop')) return;
    if(e.target.closest('.toolbar')) return;
    if(e.target.closest('.comment-marker')) return;

    const card = e.target.closest('.card');
    if(!card) return;

    e.preventDefault();
    e.stopPropagation();

    const cardId = +card.dataset.id;
    if(!cardId){
      console.warn('Keine Karten-ID gefunden');
      toast('Fehler: Karten-ID nicht gefunden', 'error');
      return;
    }
    console.log('Kommentar-Dialog öffnen für Karte:', cardId);
    openCommentDialog(cardId);
  }, true); // <- Capture-Phase

  // === TOOLBAR-EVENTS ===
  commentModeBtn.addEventListener('click', () => {
    commentMode = !commentMode;
    document.body.classList.toggle('comment-mode', commentMode);
    commentModeBtn.classList.toggle('active', commentMode);
    commentModeBtn.textContent = commentMode ? '✓ Kommentar-Modus aktiv' : '💬 Kommentieren';
    if(commentMode){
      toast('Klick auf eine Karte, um zu kommentieren', 'success');
    }
  });

  settingsBtn.addEventListener('click', showConfigDialog);

  zoomInBtn.addEventListener('click', ()=>{
    const r = viewport.getBoundingClientRect();
    zoomAt(1.2, r.width/2, r.height/2);
  });
  zoomOutBtn.addEventListener('click', ()=>{
    const r = viewport.getBoundingClientRect();
    zoomAt(1/1.2, r.width/2, r.height/2);
  });
  zoomResetBtn.addEventListener('click', fitLayoutToView);

  // === PAN/ZOOM ===
  viewport.addEventListener('wheel', (e)=>{
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    zoomAt(Math.pow(1.0015, -e.deltaY), e.clientX-rect.left, e.clientY-rect.top);
  }, {passive:false});

  let pan = null;
  viewport.addEventListener('mousedown', (e)=>{
    if(e.button !== 0 && e.button !== 1) return;
    if(e.target.closest('.card') || e.target.closest('.comment-marker')) return;
    pan = { x:e.clientX, y:e.clientY, tx:view.tx, ty:view.ty };
    viewport.classList.add('panning');
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e)=>{
    if(!pan) return;
    view.tx = pan.tx + (e.clientX - pan.x);
    view.ty = pan.ty + (e.clientY - pan.y);
    applyView();
  });
  window.addEventListener('mouseup', ()=>{
    if(pan){ pan = null; viewport.classList.remove('panning'); }
  });

  window.addEventListener('resize', applyView);

  // === POLLING ===
  function startPolling(){
    if(pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async ()=>{
      await loadBoard();
      await loadComments();
    }, POLL_INTERVAL);
  }

  // === INIT ===
  async function init(){
    if(!config){
      showConfigDialog();
      return;
    }
    toolbar.style.display = '';
    viewport.style.display = '';
    fitLayoutToView();

    const boardOk = await loadBoard();
    if(!boardOk) return;
    await loadComments();
    startPolling();
  }

  init();

})();
</script>
</body>
</html>
